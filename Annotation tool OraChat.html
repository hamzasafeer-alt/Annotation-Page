<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Annotation Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4efe6;
    --bg-2: #ebe3d4;
    --paper: #fbf7ef;
    --ink: #1a1916;
    --ink-soft: #4a463d;
    --ink-muted: #837c6c;
    --line: #d9d0bd;
    --line-soft: #e5dcc8;
    --accent: #1d4a3e;
    --accent-soft: #d6e3dc;
    --yes: #1d4a3e;
    --yes-soft: #d6e3dc;
    --no: #8a2a1a;
    --no-soft: #efd7d0;
    --unset: #837c6c;
    --warn: #a36b1f;
    --shadow: 0 1px 0 rgba(26,25,22,.04), 0 8px 24px -12px rgba(26,25,22,.18);
    --radius: 4px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(29,74,62,.04) 0, transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(163,107,31,.04) 0, transparent 40%);
    min-height: 100vh;
  }

  .display { font-family: 'Fraunces', serif; font-feature-settings: 'ss01'; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.86em; }

  /* ---------- Layout ---------- */
  .top-bar {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(14px);
    background: rgba(244,239,230,.88);
    border-bottom: 1px solid var(--line);
  }
  .top-bar-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 14px 28px;
    display: flex; align-items: center; gap: 24px;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 20px;
    font-feature-settings: 'ss01';
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .brand::before {
    content: ""; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    display: inline-block;
  }
  .brand em { font-style: italic; color: var(--ink-soft); font-weight: 400; }

  .top-bar .spacer { flex: 1; }
  .top-bar .progress {
    display: flex; align-items: center; gap: 14px;
    font-size: 13px; color: var(--ink-soft);
  }
  .progress-bar {
    width: 200px; height: 6px; background: var(--line-soft);
    border-radius: 99px; overflow: hidden; position: relative;
  }
  .progress-bar > div {
    height: 100%; background: var(--accent);
    transition: width .3s ease;
  }
  .progress-stats { font-variant-numeric: tabular-nums; }
  .progress-stats b { color: var(--ink); font-weight: 600; }

  .container {
    max-width: 1400px; margin: 0 auto;
    padding: 28px;
  }

  /* ---------- Setup screen ---------- */
  .setup-screen {
    max-width: 760px; margin: 64px auto;
    padding: 0 28px;
  }
  .setup-hero {
    text-align: center; margin-bottom: 56px;
  }
  .setup-hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500; font-size: 64px;
    line-height: 1; letter-spacing: -0.03em;
    margin: 0 0 18px;
  }
  .setup-hero h1 em { font-style: italic; color: var(--accent); }
  .setup-hero p {
    color: var(--ink-soft); font-size: 17px; max-width: 520px;
    margin: 0 auto;
  }

  .upload-grid { display: grid; gap: 18px; margin-bottom: 32px; }

  .upload-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px;
    position: relative;
    transition: border-color .2s, transform .2s;
  }
  .upload-card.has-file {
    border-color: var(--accent);
    background: linear-gradient(180deg, var(--paper) 0%, var(--accent-soft) 200%);
  }
  .upload-card .step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .upload-card h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500; font-size: 26px;
    margin: 4px 0 6px; letter-spacing: -0.01em;
  }
  .upload-card .hint {
    color: var(--ink-soft); font-size: 14px; margin-bottom: 18px;
  }
  .upload-card .file-input {
    display: flex; align-items: center; gap: 12px;
    border: 1px dashed var(--line);
    padding: 14px 16px; border-radius: var(--radius);
    background: rgba(255,255,255,.4);
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .upload-card .file-input:hover { border-color: var(--accent); background: rgba(255,255,255,.7); }
  .upload-card.has-file .file-input {
    border-style: solid; border-color: var(--accent);
    background: rgba(255,255,255,.6);
  }
  .upload-card input[type=file] { display: none; }
  .upload-card .file-label {
    flex: 1; font-size: 14px;
  }
  .upload-card .file-label .name { font-weight: 500; }
  .upload-card .file-label .stats { color: var(--ink-muted); font-size: 12px; margin-top: 2px; }
  .upload-card .check {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    opacity: 0; transition: opacity .2s;
  }
  .upload-card.has-file .check { opacity: 1; }

  .col-mapping {
    margin-top: 14px; display: none;
    background: rgba(255,255,255,.5);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
  }
  .upload-card.has-file .col-mapping { display: block; }
  .col-mapping label {
    display: flex; align-items: center; gap: 10px;
    margin: 6px 0;
  }
  .col-mapping label span:first-child {
    width: 90px; color: var(--ink-soft); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.05em;
    font-family: 'JetBrains Mono', monospace;
  }
  .col-mapping select {
    flex: 1; padding: 6px 10px;
    border: 1px solid var(--line); border-radius: 3px;
    background: white; font-family: inherit; font-size: 13px;
    color: var(--ink);
  }

  .tax-preview {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .tax-preview-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .tax-preview-list {
    margin: 0; padding-left: 22px;
    font-size: 13px; color: var(--ink-soft);
    line-height: 1.6;
  }
  .tax-preview-list li.more {
    list-style: none; margin-left: -22px;
    color: var(--ink-muted); font-style: italic;
    font-size: 12px;
  }
  .tax-preview-list li.case-id-preview {
    list-style: none; margin-left: -22px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 6px;
  }
  .case-id-tag {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 6px;
    vertical-align: 1px;
  }
  /* Case identifier badge in the conversation header */
  .case-badge {
    background: var(--accent);
    color: white;
    padding: 4px 10px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .case-badge-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
  }

  .setup-actions {
    display: flex; gap: 12px; align-items: center;
    margin-top: 12px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px;
    border: 1px solid var(--ink);
    background: var(--ink); color: var(--paper);
    font-family: inherit; font-size: 14px; font-weight: 500;
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform .15s, background .15s;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.ghost {
    background: transparent; color: var(--ink); border-color: var(--line);
  }
  .btn.ghost:hover:not(:disabled) { border-color: var(--ink); }
  .btn.accent {
    background: var(--accent); border-color: var(--accent);
  }
  .btn.small { padding: 8px 14px; font-size: 13px; }

  .resume-banner {
    margin-top: 24px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    padding: 16px 20px; border-radius: var(--radius);
    display: flex; align-items: center; gap: 14px;
  }
  .resume-banner .icon { font-size: 20px; }
  .resume-banner .text { flex: 1; font-size: 14px; }
  .resume-banner b { color: var(--ink); }

  /* ---------- Annotate screen ---------- */
  .work-layout {
    display: grid;
    grid-template-columns: minmax(380px, 4fr) minmax(520px, 6fr);
    gap: 24px;
    align-items: start;
  }

  .conv-panel {
    position: sticky; top: 80px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    max-height: calc(100vh - 110px);
    display: flex; flex-direction: column;
  }
  .conv-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-2);
  }
  .conv-num {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.01em;
  }
  .conv-num em { color: var(--ink-muted); font-style: italic; font-weight: 400; }
  .conv-nav { display: flex; gap: 4px; align-items: center; }
  .nav-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--line); background: var(--paper);
    border-radius: 3px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); font-size: 14px;
    transition: all .15s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .conv-jump {
    border: 1px solid var(--line); background: var(--paper);
    border-radius: 3px; padding: 4px 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    width: 56px; text-align: center;
    color: var(--ink);
  }

  .conv-body {
    overflow-y: auto; flex: 1;
  }
  .conv-block {
    padding: 18px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .conv-block:last-child { border-bottom: none; }
  .conv-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .conv-label::after {
    content: ""; flex: 1; height: 1px; background: var(--line-soft);
  }
  .conv-label.prompt { color: var(--accent); }
  .conv-label.prompt::before { content: "→"; }
  .conv-label.response::before { content: "←"; }
  .conv-text {
    font-size: 14.5px; line-height: 1.6;
    word-wrap: break-word;
    color: var(--ink);
  }
  .conv-text.empty { color: var(--ink-muted); font-style: italic; }
  /* Markdown element styling inside conv-text */
  .conv-text p { margin: 0 0 10px; }
  .conv-text p:last-child { margin-bottom: 0; }
  .conv-text h1, .conv-text h2, .conv-text h3, .conv-text h4 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 14px 0 6px;
    line-height: 1.25;
  }
  .conv-text h1 { font-size: 20px; }
  .conv-text h2 { font-size: 18px; }
  .conv-text h3 { font-size: 16px; }
  .conv-text h4 { font-size: 15px; }
  .conv-text ul, .conv-text ol { margin: 6px 0 10px; padding-left: 22px; }
  .conv-text li { margin: 3px 0; }
  .conv-text li > p { margin: 0; }
  .conv-text strong { font-weight: 600; color: var(--ink); }
  .conv-text em { font-style: italic; }
  .conv-text a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .conv-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--bg-2);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .conv-text pre {
    background: var(--ink);
    color: var(--paper);
    padding: 12px 14px;
    border-radius: var(--radius);
    overflow-x: auto;
    font-size: 12.5px;
    line-height: 1.5;
    margin: 8px 0 12px;
  }
  .conv-text pre code {
    background: transparent;
    padding: 0;
    color: inherit;
    font-size: inherit;
  }
  .conv-text blockquote {
    border-left: 3px solid var(--line);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--ink-soft);
    font-style: italic;
  }
  .conv-text table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 13px;
  }
  .conv-text th, .conv-text td {
    border: 1px solid var(--line);
    padding: 6px 10px;
    text-align: left;
  }
  .conv-text th { background: var(--bg-2); font-weight: 600; }
  .conv-text hr { border: none; border-top: 1px solid var(--line); margin: 12px 0; }

  /* Overall notes block */
  .conv-block.notes-block { background: rgba(214,227,220,.25); }
  .conv-notes-input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 3px;
    padding: 10px 12px;
    font-family: inherit; font-size: 14px;
    color: var(--ink); resize: vertical;
    min-height: 70px;
    line-height: 1.55;
    transition: border-color .15s, background .15s;
  }
  .conv-notes-input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .conv-notes-input::placeholder { color: var(--ink-muted); font-style: italic; }
  .view-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    margin-left: auto;
    font-size: 11px; color: var(--ink-muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .view-toggle input { margin: 0; }

  /* ---------- Taxonomy panel ---------- */
  .tax-panel { display: flex; flex-direction: column; gap: 10px; }
  .tax-summary {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 18px;
    font-size: 13px;
  }
  .summary-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-variant-numeric: tabular-nums;
  }
  .summary-chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .summary-chip.yes .dot { background: var(--yes); }
  .summary-chip.no .dot { background: var(--no); }
  .summary-chip.pending .dot { background: var(--line); border: 1px solid var(--ink-muted); }
  .summary-chip b { color: var(--ink); font-weight: 600; }
  .tax-summary .spacer { flex: 1; }
  .filter-toggle {
    display: flex; gap: 0; border: 1px solid var(--line);
    border-radius: 3px; overflow: hidden;
  }
  .filter-toggle button {
    border: none; background: var(--paper);
    padding: 5px 12px; font-family: inherit; font-size: 12px;
    color: var(--ink-soft); cursor: pointer;
    border-right: 1px solid var(--line);
  }
  .filter-toggle button:last-child { border-right: none; }
  .filter-toggle button.active { background: var(--ink); color: var(--paper); }

  .tax-item {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition: border-color .2s, box-shadow .2s;
  }
  .tax-item.yes { border-left: 3px solid var(--yes); }
  .tax-item.no { border-left: 3px solid var(--no); }
  .tax-item.unset { border-left: 3px solid transparent; }
  .tax-item.hidden { display: none; }

  .tax-row {
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 30px 1fr auto;
    gap: 14px; align-items: center;
  }
  .tax-index {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-muted);
    font-variant-numeric: tabular-nums;
  }
  .tax-name {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 500;
    letter-spacing: -0.005em;
    line-height: 1.3;
  }

  .toggle-group {
    display: flex; border: 1px solid var(--line);
    border-radius: 99px; overflow: hidden;
    background: var(--bg);
  }
  .toggle-btn {
    border: none; background: transparent;
    padding: 6px 18px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all .15s;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase; font-size: 11px;
  }
  .toggle-btn:hover { color: var(--ink); }
  .toggle-btn.active.yes-btn { background: var(--yes); color: white; }
  .toggle-btn.active.no-btn { background: var(--no); color: white; }

  .note-wrap {
    padding: 0 18px 14px 62px;
  }
  .note-input {
    width: 100%;
    border: 1px solid var(--line-soft);
    background: var(--bg);
    border-radius: 3px;
    padding: 10px 12px;
    font-family: inherit; font-size: 13.5px;
    color: var(--ink); resize: vertical;
    min-height: 38px;
    line-height: 1.5;
    transition: border-color .15s, background .15s;
  }
  .note-input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .note-input::placeholder { color: var(--ink-muted); font-style: italic; }

  /* ---------- Footer / actions ---------- */
  .bottom-actions {
    margin-top: 28px;
    padding: 20px 0;
    border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
  }
  .save-indicator {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .save-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .save-indicator.saving .dot { background: var(--warn); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--paper);
    padding: 12px 20px; border-radius: var(--radius);
    font-size: 14px; z-index: 100;
    transition: transform .3s ease;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .error-banner {
    background: var(--no-soft); border: 1px solid var(--no);
    color: var(--no); padding: 12px 16px;
    border-radius: var(--radius); margin: 12px 0;
    font-size: 14px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .work-layout { grid-template-columns: 1fr; }
    .conv-panel { position: static; max-height: 400px; }
    .setup-hero h1 { font-size: 44px; }
    .top-bar .progress { display: none; }
    .container { padding: 18px; }
    .top-bar-inner { padding: 12px 18px; }
  }

  .kbd {
    display: inline-block;
    border: 1px solid var(--line); border-bottom-width: 2px;
    background: var(--paper); border-radius: 3px;
    padding: 1px 6px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-soft);
  }
</style>
</head>
<body>

<div id="topbar" class="top-bar" style="display:none;">
  <div class="top-bar-inner">
    <div class="brand">Annotation <em>Studio</em></div>
    <div class="spacer"></div>
    <div class="progress">
      <span class="progress-stats">
        <b id="prog-done">0</b> of <b id="prog-total">0</b> annotated
      </span>
      <div class="progress-bar"><div id="prog-fill" style="width:0%"></div></div>
      <button class="btn ghost small" onclick="exportData()">Export</button>
      <button class="btn ghost small" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</div>

<div id="app"></div>

<div id="toast" class="toast"></div>

<script>
/* =========================================================
   ANNOTATION STUDIO
   ========================================================= */

const STORAGE_KEY = 'annotation-session-v1';

const state = {
  view: 'setup',
  promptsFile: null,
  promptsRows: [],
  promptsHeaders: [],
  promptCol: null,
  responseCol: null,
  taxonomyFile: null,
  taxonomyItems: [],
  taxonomyRawItems: [],     // full list before excluding caseIdField
  caseIdField: null,        // name of the first item if it's a case identifier (excluded from toggles)
  caseIdAutoDetected: false,
  taxonomyRawRows: [],      // full sheet as array-of-arrays (incl. header)
  taxonomyHeaders: [],      // column labels (A,B,C... or detected names)
  taxonomyColIdx: 0,        // which column is selected
  taxonomySkipFirst: true,  // whether to treat row 0 as a header row
  conversations: [],
  annotations: {},  // { convIdx: { taxIdx: { value: 'yes'|'no'|null, note: '' } } }
  conversationNotes: {}, // { convIdx: 'overall note string' }
  currentIndex: 0,
  filter: 'all',    // 'all' | 'pending' | 'yes' | 'no'
};

let saveTimer = null;

/* ---------- Persistence ---------- */
async function saveSession(showIndicator = true) {
  if (showIndicator) setSaveIndicator('saving');
  try {
    const payload = {
      promptsHeaders: state.promptsHeaders,
      promptCol: state.promptCol,
      responseCol: state.responseCol,
      taxonomyItems: state.taxonomyItems,
      caseIdField: state.caseIdField,
      conversations: state.conversations,
      annotations: state.annotations,
      conversationNotes: state.conversationNotes,
      currentIndex: state.currentIndex,
      savedAt: new Date().toISOString(),
    };
    await window.storage.set(STORAGE_KEY, JSON.stringify(payload));
    if (showIndicator) setTimeout(() => setSaveIndicator('saved'), 400);
  } catch (e) {
    console.error('Save failed', e);
    if (showIndicator) setSaveIndicator('error');
  }
}

function scheduleSave() {
  setSaveIndicator('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveSession(true), 600);
}

async function loadSession() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (!r) return null;
    return JSON.parse(r.value);
  } catch (e) {
    return null;
  }
}

async function clearSession() {
  try { await window.storage.delete(STORAGE_KEY); } catch(e) {}
}

function setSaveIndicator(status) {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.className = 'save-indicator ' + (status === 'saving' ? 'saving' : '');
  el.querySelector('.label').textContent =
    status === 'saving' ? 'Saving…' :
    status === 'error' ? 'Save error' :
    'All changes saved';
}

/* ---------- Toast ---------- */
function toast(msg, ms = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

/* ---------- Render: Setup ---------- */
function renderSetup(existingSession) {
  document.getElementById('topbar').style.display = 'none';
  const root = document.getElementById('app');

  root.innerHTML = `
    <div class="setup-screen">
      <div class="setup-hero">
        <h1>Annotation <em>Studio</em></h1>
        <p>Drop in your conversations and taxonomy, then work through each prompt-response pair with a clear Yes/No call and a note for every category.</p>
      </div>

      ${existingSession ? `
        <div class="resume-banner">
          <div class="icon">↺</div>
          <div class="text">
            <b>You have a saved session</b> — ${existingSession.conversations.length} conversations,
            ${countAnnotated(existingSession.annotations)} annotated.
            Last saved ${formatTime(existingSession.savedAt)}.
          </div>
          <button class="btn small" onclick="resumeSession()">Resume</button>
          <button class="btn ghost small" onclick="discardSession()">Start fresh</button>
        </div>
      ` : ''}

      <div class="upload-grid">
        <div class="upload-card ${state.promptsRows.length ? 'has-file' : ''}" id="prompts-card">
          <div class="step">Step 01</div>
          <h3>Conversations</h3>
          <p class="hint">An Excel file with one row per prompt-response pair. Columns are auto-detected.</p>
          <label class="file-input">
            <input type="file" accept=".xlsx,.xls,.csv" onchange="handlePromptsFile(event)" />
            <div class="file-label">
              ${state.promptsFile ? `
                <div class="name">${state.promptsFile}</div>
                <div class="stats">${state.promptsRows.length} rows • ${state.promptsHeaders.length} columns</div>
              ` : `
                <div class="name">Choose file…</div>
                <div class="stats">.xlsx, .xls, or .csv</div>
              `}
            </div>
            <div class="check">✓</div>
          </label>
          <div class="col-mapping">
            <label>
              <span>Prompt</span>
              <select onchange="state.promptCol = this.value; renderSetup();">
                ${state.promptsHeaders.map(h => `<option value="${escapeAttr(h)}" ${h===state.promptCol?'selected':''}>${escapeHtml(h)}</option>`).join('')}
              </select>
            </label>
            <label>
              <span>Response</span>
              <select onchange="state.responseCol = this.value; renderSetup();">
                ${state.promptsHeaders.map(h => `<option value="${escapeAttr(h)}" ${h===state.responseCol?'selected':''}>${escapeHtml(h)}</option>`).join('')}
              </select>
            </label>
          </div>
        </div>

        <div class="upload-card ${state.taxonomyItems.length ? 'has-file' : ''}" id="tax-card">
          <div class="step">Step 02</div>
          <h3>Taxonomy</h3>
          <p class="hint">An Excel file listing your categories. Pick the column they live in if auto-detection is off.</p>
          <label class="file-input">
            <input type="file" accept=".xlsx,.xls,.csv" onchange="handleTaxonomyFile(event)" />
            <div class="file-label">
              ${state.taxonomyFile ? `
                <div class="name">${state.taxonomyFile}</div>
                <div class="stats">
                  ${state.taxonomyItems.length} toggleable item${state.taxonomyItems.length===1?'':'s'}
                  ${state.caseIdField ? ` · "${escapeHtml(state.caseIdField)}" as case identifier` : ''}
                </div>
              ` : `
                <div class="name">Choose file…</div>
                <div class="stats">.xlsx, .xls, or .csv</div>
              `}
            </div>
            <div class="check">✓</div>
          </label>
          ${state.taxonomyFile ? `
            <div class="col-mapping" style="display:block;">
              <label>
                <span>Column</span>
                <select onchange="changeTaxonomyColumn(this.value)">
                  ${state.taxonomyHeaders.map((h, i) => `
                    <option value="${i}" ${i===state.taxonomyColIdx?'selected':''}>${escapeHtml(h)}</option>
                  `).join('')}
                </select>
              </label>
              <label style="font-size:12px; color:var(--ink-soft);">
                <span></span>
                <span style="display:flex; align-items:center; gap:8px; flex:1;">
                  <input type="checkbox" ${state.taxonomySkipFirst?'checked':''}
                    onchange="toggleTaxonomyHeader(this.checked)" />
                  First row is a header (skip it)
                </span>
              </label>
              ${state.taxonomyRawItems.length ? `
                <label style="font-size:12px; color:var(--ink-soft);">
                  <span></span>
                  <span style="display:flex; align-items:center; gap:8px; flex:1;">
                    <input type="checkbox" ${state.caseIdField?'checked':''}
                      onchange="toggleCaseIdField(this.checked)" />
                    Treat first item ("${escapeHtml(state.taxonomyRawItems[0] || '')}") as a case identifier (no Yes/No toggle)
                  </span>
                </label>
              ` : ''}
              <div class="tax-preview">
                <div class="tax-preview-label">
                  Preview · ${state.caseIdField ? 'case identifier + ' : ''}first ${Math.min(state.taxonomyItems.length, 6)} toggleable items
                </div>
                <ol class="tax-preview-list">
                  ${state.caseIdField ? `<li class="case-id-preview">⚑ ${escapeHtml(state.caseIdField)} <span class="case-id-tag">case identifier</span></li>` : ''}
                  ${state.taxonomyItems.slice(0, 6).map(it => `<li>${escapeHtml(it)}</li>`).join('')}
                  ${state.taxonomyItems.length > 6 ? `<li class="more">+ ${state.taxonomyItems.length - 6} more</li>` : ''}
                  ${state.taxonomyItems.length === 0 ? '<li class="more">No items found in this column.</li>' : ''}
                </ol>
              </div>
            </div>
          ` : ''}
        </div>
      </div>

      <div id="setup-error"></div>

      <div class="setup-actions">
        <button class="btn accent" onclick="startAnnotating()"
          ${(state.promptsRows.length && state.taxonomyItems.length && state.promptCol && state.responseCol) ? '' : 'disabled'}>
          Start annotating →
        </button>
        <span style="color:var(--ink-muted); font-size: 13px;">
          Use <span class="kbd">←</span> <span class="kbd">→</span> to navigate · autosaves continuously
        </span>
      </div>
    </div>
  `;
}

/* ---------- File handling ---------- */
async function handlePromptsFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    if (!rows.length) throw new Error('Sheet is empty');
    state.promptsFile = file.name;
    state.promptsRows = rows;
    state.promptsHeaders = Object.keys(rows[0]);
    // Auto-detect columns
    state.promptCol = detectColumn(state.promptsHeaders,
      ['prompt','question','input','query','user','user_message','user message']) || state.promptsHeaders[0];
    state.responseCol = detectColumn(state.promptsHeaders,
      ['response','answer','output','reply','bot','assistant','bot_response','bot response','assistant_response']) ||
      state.promptsHeaders[1] || state.promptsHeaders[0];
    renderSetup();
  } catch (e) {
    showSetupError('Could not read conversations file: ' + e.message);
  }
}

async function handleTaxonomyFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const sheet = wb.Sheets[wb.SheetNames[0]];

    // Get raw rows (array-of-arrays) so we can inspect any column
    const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', blankrows: false });
    if (!raw.length) throw new Error('Sheet is empty');

    // Determine column count from the widest row
    const maxCols = Math.max(...raw.map(r => r.length));
    // Normalize rows to equal length
    const rows = raw.map(r => {
      const out = new Array(maxCols).fill('');
      for (let i = 0; i < r.length; i++) out[i] = r[i] ?? '';
      return out;
    });

    // Build header labels: prefer cell value in row 0 if it looks like a label,
    // otherwise fall back to "Column A", "Column B", ...
    const colLetter = (n) => {
      let s = '';
      n += 1;
      while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); }
      return s;
    };
    const firstRow = rows[0] || [];
    const looksLikeHeader = firstRow.some(c => {
      const s = String(c ?? '').trim();
      return s && isNaN(Number(s));   // any non-numeric text in row 0 → probably header
    });
    const headers = [];
    for (let c = 0; c < maxCols; c++) {
      const v = String(firstRow[c] ?? '').trim();
      if (looksLikeHeader && v) headers.push(v);
      else headers.push('Column ' + colLetter(c));
    }

    // Score each column. We want to pick the column with the most text-like
    // taxonomy entries — not an ID/number column that happens to be filled.
    // Score = (non-empty count) + bonuses for being mostly non-numeric, having
    // reasonable label-length values, and matching a taxonomy-y header name.
    const startRow = looksLikeHeader ? 1 : 0;
    const taxonomyHeaderHints = /^(taxonomy|categor|label|name|item|class|tag|topic|type|criterion|criteria|dimension|attribute|aspect|metric)/i;
    const scores = new Array(maxCols).fill(0);
    for (let c = 0; c < maxCols; c++) {
      let filled = 0, numeric = 0, textChars = 0, textCount = 0;
      for (let r = startRow; r < rows.length; r++) {
        const raw = rows[r][c];
        const s = String(raw ?? '').trim();
        if (!s) continue;
        filled++;
        // Treat as numeric if it parses as a pure number (e.g. "1", "12", "3.14")
        if (!isNaN(Number(s)) && /^-?\d+(\.\d+)?$/.test(s)) {
          numeric++;
        } else {
          textCount++;
          textChars += s.length;
        }
      }
      if (filled === 0) { scores[c] = 0; continue; }
      const textRatio = textCount / filled;        // 1.0 = all text, 0 = all numbers
      const avgLen = textCount ? textChars / textCount : 0;
      // Length bonus: peaks around 6–40 chars (typical taxonomy label length)
      const lenBonus = (avgLen >= 3 && avgLen <= 60) ? 1 : 0.3;
      const headerBonus = taxonomyHeaderHints.test(headers[c]) ? 1.5 : 1.0;
      // Strongly prefer non-numeric: multiply filled count by textRatio so a
      // pure-numbers column scores near zero even if it has lots of entries.
      scores[c] = filled * textRatio * lenBonus * headerBonus;
    }
    let bestCol = 0;
    for (let c = 1; c < maxCols; c++) if (scores[c] > scores[bestCol]) bestCol = c;
    // Fallback: if every column scored 0 (all numeric/empty), just pick the
    // one with the most non-empty cells so the user can override via the picker.
    if (scores[bestCol] === 0) {
      const fallbackScores = new Array(maxCols).fill(0);
      for (let c = 0; c < maxCols; c++) {
        for (let r = startRow; r < rows.length; r++) {
          if (String(rows[r][c] ?? '').trim()) fallbackScores[c]++;
        }
      }
      bestCol = 0;
      for (let c = 1; c < maxCols; c++) if (fallbackScores[c] > fallbackScores[bestCol]) bestCol = c;
    }

    // Horizontal-layout fallback: if no column has any data rows but the first row has
    // many text cells, the taxonomy was probably laid across row 0.
    let useHorizontal = false;
    if (scores[bestCol] === 0) {
      const textCellsInFirstRow = firstRow.filter(c => String(c ?? '').trim()).length;
      if (textCellsInFirstRow >= 2) useHorizontal = true;
    }

    state.taxonomyFile = file.name;
    state.taxonomyRawRows = rows;
    state.taxonomyHeaders = headers;
    state.taxonomyColIdx = bestCol;
    state.taxonomySkipFirst = looksLikeHeader && !useHorizontal;
    // Reset case-id state so detection runs fresh on this new file
    state.caseIdField = null;
    state.caseIdAutoDetected = false;

    if (useHorizontal) {
      // Treat the first row as the list of taxonomy items
      state.taxonomyRawItems = firstRow.map(c => String(c ?? '').trim()).filter(Boolean);
      state.taxonomyHeaders = ['(row 1 — horizontal layout)'];
      state.taxonomyColIdx = 0;
      state.taxonomyRawRows = [firstRow];
      state.taxonomySkipFirst = false;
      applyCaseIdField();
    } else {
      rebuildTaxonomyItems();
    }

    renderSetup();
  } catch (e) {
    showSetupError('Could not read taxonomy file: ' + e.message);
  }
}

function rebuildTaxonomyItems() {
  const start = state.taxonomySkipFirst ? 1 : 0;
  const col = state.taxonomyColIdx;
  state.taxonomyRawItems = state.taxonomyRawRows
    .slice(start)
    .map(r => String(r[col] ?? '').trim())
    .filter(Boolean);
  applyCaseIdField();
}

/**
 * If the first taxonomy item looks like a row identifier (Case ID, ID, Ref, etc.),
 * split it off so it's not rendered as a Yes/No toggle. The user can override this
 * via the checkbox in the upload card.
 */
function applyCaseIdField() {
  const identifierPattern = /^(case\s*[-_]?\s*(id|no|num(ber)?|#)|case|id|ref(erence)?|sequence|index|row\s*(no|num(ber)?|#)?|#|sr\.?\s*no\.?)$/i;
  if (state.taxonomyRawItems.length && identifierPattern.test(state.taxonomyRawItems[0])) {
    // Only auto-set if the user hasn't manually overridden
    if (state.caseIdAutoDetected || state.caseIdField === null) {
      state.caseIdField = state.taxonomyRawItems[0];
      state.caseIdAutoDetected = true;
    }
  } else {
    if (state.caseIdAutoDetected) {
      state.caseIdField = null;
      state.caseIdAutoDetected = false;
    }
  }
  if (state.caseIdField && state.taxonomyRawItems[0] === state.caseIdField) {
    state.taxonomyItems = state.taxonomyRawItems.slice(1);
  } else {
    state.taxonomyItems = state.taxonomyRawItems.slice();
  }
}

function toggleCaseIdField(useAsId) {
  if (useAsId) {
    if (state.taxonomyRawItems.length) state.caseIdField = state.taxonomyRawItems[0];
    state.caseIdAutoDetected = false;  // explicit user choice
  } else {
    state.caseIdField = null;
    state.caseIdAutoDetected = false;
  }
  if (state.caseIdField) {
    state.taxonomyItems = state.taxonomyRawItems.slice(1);
  } else {
    state.taxonomyItems = state.taxonomyRawItems.slice();
  }
  renderSetup();
}

function changeTaxonomyColumn(idx) {
  state.taxonomyColIdx = parseInt(idx, 10);
  rebuildTaxonomyItems();
  renderSetup();
}

function toggleTaxonomyHeader(skip) {
  state.taxonomySkipFirst = skip;
  rebuildTaxonomyItems();
  renderSetup();
}

function detectColumn(headers, candidates) {
  const lower = headers.map(h => h.toLowerCase().trim());
  for (const c of candidates) {
    const idx = lower.indexOf(c);
    if (idx >= 0) return headers[idx];
  }
  for (const c of candidates) {
    const idx = lower.findIndex(h => h.includes(c));
    if (idx >= 0) return headers[idx];
  }
  return null;
}

function showSetupError(msg) {
  const el = document.getElementById('setup-error');
  if (el) el.innerHTML = `<div class="error-banner">${escapeHtml(msg)}</div>`;
}

/* ---------- Start / resume ---------- */

/**
 * Some upstream pipelines store prompts as JSON-encoded strings and paste them
 * into Excel without decoding — so a cell that should read "## Heading\n\nBody"
 * arrives as the literal characters `## Heading\n\nBody` with backslash-n
 * sequences instead of real newlines. Markdown headings, lists, and code blocks
 * only render when the special marker is at the start of a real line, so we
 * normalize the common JSON escape sequences here. If the text was already
 * stored with real newlines, this is a no-op.
 */
function unescapeText(s) {
  if (!s || typeof s !== 'string') return s;
  // Only act if the text looks JSON-escaped (contains literal \n, \r, or \t).
  // This avoids touching content that already has real newlines.
  if (!/\\[nrt"\\]/.test(s)) return s;
  return s
    .replace(/\\r\\n/g, '\n')   // Windows-style first
    .replace(/\\n/g, '\n')
    .replace(/\\r/g, '\n')
    .replace(/\\t/g, '\t')
    .replace(/\\"/g, '"')
    .replace(/\\\\/g, '\\');
}

/**
 * Strip residual leading-whitespace padding from prompts that were originally
 * written as Python f-strings or docstrings. Those typically have a title at
 * column 0 and a body indented by 4 spaces — which markdown then treats as a
 * code block. We detect when the majority of non-empty lines share leading
 * whitespace and remove it. Real code blocks (fenced with ``` or natural list
 * indentation) are unaffected because they don't trigger the "majority indented"
 * pattern.
 */
function dedentForMarkdown(s) {
  if (!s || typeof s !== 'string') return s;
  const lines = s.split('\n');
  // Count non-empty lines and their leading-space widths
  let nonEmpty = 0;
  let minAllIndent = Infinity;
  const indentedWidths = [];
  for (const line of lines) {
    if (line.trim() === '') continue;
    nonEmpty++;
    const m = line.match(/^( +)/);
    const w = m ? m[1].length : 0;
    if (w < minAllIndent) minAllIndent = w;
    if (w > 0) indentedWidths.push(w);
  }
  if (nonEmpty === 0) return s;
  if (minAllIndent === Infinity) minAllIndent = 0;

  // Case A: every non-empty line is indented by the same minimum — standard dedent.
  if (minAllIndent > 0) {
    return lines.map(l => l.length >= minAllIndent ? l.slice(minAllIndent) : l).join('\n');
  }
  // Case B: some lines start at column 0 (often a title), but the majority of
  // non-empty lines are indented uniformly — strip the common indent off those.
  if (indentedWidths.length / nonEmpty >= 0.5) {
    const dedentBy = Math.min(...indentedWidths);
    if (dedentBy >= 2) {
      const prefix = ' '.repeat(dedentBy);
      return lines.map(l => l.startsWith(prefix) ? l.slice(dedentBy) : l).join('\n');
    }
  }
  return s;
}

function startAnnotating() {
  // Build conversations list, unescaping JSON-style escape sequences so
  // markdown headings/lists render correctly.
  state.conversations = state.promptsRows.map((row, i) => ({
    index: i,
    prompt: dedentForMarkdown(unescapeText((row[state.promptCol] ?? '').toString())),
    response: dedentForMarkdown(unescapeText((row[state.responseCol] ?? '').toString())),
    original: row,
  }));
  state.currentIndex = 0;
  state.view = 'annotate';
  // Initialize annotations skeleton
  state.conversations.forEach((c, i) => {
    if (!state.annotations[i]) state.annotations[i] = {};
  });
  saveSession(false);
  renderAnnotate();
}

async function resumeSession() {
  const s = await loadSession();
  if (!s) return;
  state.promptsHeaders = s.promptsHeaders || [];
  state.promptCol = s.promptCol;
  state.responseCol = s.responseCol;
  state.taxonomyItems = s.taxonomyItems || [];
  state.caseIdField = s.caseIdField || null;
  state.conversations = s.conversations || [];
  state.annotations = s.annotations || {};
  state.conversationNotes = s.conversationNotes || {};
  state.currentIndex = s.currentIndex || 0;
  state.view = 'annotate';
  renderAnnotate();
}

async function discardSession() {
  await clearSession();
  toast('Saved session cleared');
  renderSetup(null);
}

async function confirmReset() {
  if (!confirm('Reset everything? Your annotations will be lost.')) return;
  await clearSession();
  Object.assign(state, {
    view: 'setup',
    promptsFile: null, promptsRows: [], promptsHeaders: [],
    promptCol: null, responseCol: null,
    taxonomyFile: null, taxonomyItems: [], taxonomyRawItems: [],
    caseIdField: null, caseIdAutoDetected: false,
    conversations: [], annotations: {}, conversationNotes: {},
    currentIndex: 0, filter: 'all',
  });
  renderSetup(null);
}

/* ---------- Render: Annotate ---------- */
function renderAnnotate() {
  document.getElementById('topbar').style.display = 'block';
  updateProgress();

  const root = document.getElementById('app');
  const conv = state.conversations[state.currentIndex];
  if (!conv) {
    root.innerHTML = '<div class="container">No conversation at this index.</div>';
    return;
  }

  root.innerHTML = `
    <div class="container">
      <div class="work-layout">
        <div class="conv-panel">
          <div class="conv-header">
            <div class="conv-num">
              ${state.caseIdField ? `
                <span class="case-badge-label">${escapeHtml(state.caseIdField)}</span>
                <span class="case-badge">${pad(state.currentIndex + 1)}</span>
                <em style="margin-left:8px;">${state.currentIndex + 1} / ${state.conversations.length}</em>
              ` : `
                <span>${pad(state.currentIndex + 1)}</span>
                <em> / ${state.conversations.length}</em>
              `}
            </div>
            <div class="conv-nav">
              <button class="nav-btn" onclick="goTo(0)" ${state.currentIndex===0?'disabled':''} title="First">⇤</button>
              <button class="nav-btn" onclick="goTo(state.currentIndex-1)" ${state.currentIndex===0?'disabled':''} title="Previous (←)">←</button>
              <input class="conv-jump" type="number" min="1" max="${state.conversations.length}"
                value="${state.currentIndex+1}" onchange="goTo(parseInt(this.value)-1)" />
              <button class="nav-btn" onclick="goTo(state.currentIndex+1)" ${state.currentIndex===state.conversations.length-1?'disabled':''} title="Next (→)">→</button>
              <button class="nav-btn" onclick="goTo(state.conversations.length-1)" ${state.currentIndex===state.conversations.length-1?'disabled':''} title="Last">⇥</button>
            </div>
          </div>
          <div class="conv-body">
            <div class="conv-block">
              <div class="conv-label prompt">Prompt</div>
              <div class="conv-text ${conv.prompt.trim() ? '' : 'empty'}">${conv.prompt.trim() ? renderMarkdown(conv.prompt) : '(empty)'}</div>
            </div>
            <div class="conv-block">
              <div class="conv-label response">Response</div>
              <div class="conv-text ${conv.response.trim() ? '' : 'empty'}">${conv.response.trim() ? renderMarkdown(conv.response) : '(empty)'}</div>
            </div>
            <div class="conv-block notes-block">
              <div class="conv-label">Overall notes</div>
              <textarea class="conv-notes-input"
                placeholder="General notes about this conversation — things that span multiple categories, overall quality, edge cases, anything worth flagging…"
                oninput="setConversationNote(this.value)">${escapeHtml(state.conversationNotes[state.currentIndex] || '')}</textarea>
            </div>
          </div>
        </div>

        <div class="tax-panel">
          <div class="tax-summary" id="tax-summary"></div>
          <div id="tax-list"></div>
        </div>
      </div>

      <div class="bottom-actions">
        <span class="save-indicator" id="save-indicator">
          <span class="dot"></span><span class="label">All changes saved</span>
        </span>
        <span style="flex:1"></span>
        <button class="btn ghost small" onclick="goTo(state.currentIndex-1)" ${state.currentIndex===0?'disabled':''}>← Previous</button>
        <button class="btn small" onclick="goTo(state.currentIndex+1)" ${state.currentIndex===state.conversations.length-1?'disabled':''}>Next →</button>
      </div>
    </div>
  `;

  renderTaxonomy();
}

function renderTaxonomy() {
  const conv = state.conversations[state.currentIndex];
  const ann = state.annotations[state.currentIndex] || {};
  const items = state.taxonomyItems;

  let yesCount = 0, noCount = 0, pendingCount = 0;
  items.forEach((_, i) => {
    const v = ann[i]?.value;
    if (v === 'yes') yesCount++;
    else if (v === 'no') noCount++;
    else pendingCount++;
  });

  document.getElementById('tax-summary').innerHTML = `
    <span class="summary-chip yes"><span class="dot"></span><b>${yesCount}</b> yes</span>
    <span class="summary-chip no"><span class="dot"></span><b>${noCount}</b> no</span>
    <span class="summary-chip pending"><span class="dot"></span><b>${pendingCount}</b> pending</span>
    <span class="spacer"></span>
    <div class="filter-toggle">
      <button class="${state.filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
      <button class="${state.filter==='pending'?'active':''}" onclick="setFilter('pending')">Pending</button>
      <button class="${state.filter==='yes'?'active':''}" onclick="setFilter('yes')">Yes</button>
      <button class="${state.filter==='no'?'active':''}" onclick="setFilter('no')">No</button>
    </div>
  `;

  const list = document.getElementById('tax-list');
  list.innerHTML = items.map((name, i) => {
    const a = ann[i] || {};
    const v = a.value || null;
    const note = a.note || '';
    const cls = v === 'yes' ? 'yes' : v === 'no' ? 'no' : 'unset';
    const hidden = filterHides(state.filter, v) ? 'hidden' : '';
    return `
      <div class="tax-item ${cls} ${hidden}" data-tax="${i}">
        <div class="tax-row">
          <div class="tax-index">${pad(i+1, 2)}</div>
          <div class="tax-name">${escapeHtml(name)}</div>
          <div class="toggle-group">
            <button class="toggle-btn yes-btn ${v==='yes'?'active':''}" onclick="setValue(${i},'yes')">Yes</button>
            <button class="toggle-btn no-btn ${v==='no'?'active':''}" onclick="setValue(${i},'no')">No</button>
          </div>
        </div>
        <div class="note-wrap">
          <textarea class="note-input" placeholder="Why did you choose this? (optional)"
            oninput="setNote(${i}, this.value)"
            rows="1">${escapeHtml(note)}</textarea>
        </div>
      </div>
    `;
  }).join('');

  // Auto-resize textareas based on content
  list.querySelectorAll('.note-input').forEach(autoSize);
}

function autoSize(ta) {
  const adjust = () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 240) + 'px';
  };
  ta.addEventListener('input', adjust);
  // initial
  requestAnimationFrame(adjust);
}

function filterHides(filter, v) {
  if (filter === 'all') return false;
  if (filter === 'pending') return v === 'yes' || v === 'no';
  return v !== filter;
}

function setFilter(f) {
  state.filter = f;
  renderTaxonomy();
}

/* ---------- Annotation ops ---------- */
function setValue(taxIdx, value) {
  const ci = state.currentIndex;
  if (!state.annotations[ci]) state.annotations[ci] = {};
  if (!state.annotations[ci][taxIdx]) state.annotations[ci][taxIdx] = { value: null, note: '' };
  // Toggle off if clicking the same value
  if (state.annotations[ci][taxIdx].value === value) {
    state.annotations[ci][taxIdx].value = null;
  } else {
    state.annotations[ci][taxIdx].value = value;
  }
  scheduleSave();
  renderTaxonomy();
  updateProgress();
}

function setNote(taxIdx, value) {
  const ci = state.currentIndex;
  if (!state.annotations[ci]) state.annotations[ci] = {};
  if (!state.annotations[ci][taxIdx]) state.annotations[ci][taxIdx] = { value: null, note: '' };
  state.annotations[ci][taxIdx].note = value;
  scheduleSave();
}

function goTo(idx) {
  if (idx < 0 || idx >= state.conversations.length) return;
  state.currentIndex = idx;
  scheduleSave();
  renderAnnotate();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const total = state.conversations.length;
  const done = Object.keys(state.annotations).filter(i => {
    const ann = state.annotations[i];
    return state.taxonomyItems.every((_, t) => ann[t]?.value === 'yes' || ann[t]?.value === 'no');
  }).length;
  document.getElementById('prog-done').textContent = done;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-fill').style.width = total ? (done/total*100) + '%' : '0%';
}

function countAnnotated(annotations) {
  if (!annotations) return 0;
  return Object.values(annotations).filter(a =>
    Object.values(a || {}).some(v => v.value === 'yes' || v.value === 'no')
  ).length;
}

/* ---------- Export ---------- */
function exportData() {
  if (!state.conversations.length) { toast('Nothing to export yet'); return; }
  const tax = state.taxonomyItems;

  // Helper to title-case the toggle value for export
  const fmtValue = (v) => v === 'yes' ? 'Yes' : v === 'no' ? 'No' : '';

  // ---- Sheet 1: Full annotations (everything in one row) ----
  const rows = state.conversations.map((c, ci) => {
    const ann = state.annotations[ci] || {};
    const row = {
      '#': ci + 1,
    };
    if (state.caseIdField) {
      row[state.caseIdField] = ci + 1;
    }
    row['Prompt'] = c.prompt;
    row['Response'] = c.response;
    row['Overall notes'] = state.conversationNotes[ci] || '';
    tax.forEach((name, ti) => {
      const a = ann[ti] || {};
      row[name] = fmtValue(a.value);
      row[name + ' — note'] = a.note || '';
    });
    return row;
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  const headers = Object.keys(rows[0]);
  ws['!cols'] = headers.map(k => {
    if (k === 'Prompt' || k === 'Response') return { wch: 35 };
    if (k === 'Overall notes') return { wch: 30 };
    if (k === '#') return { wch: 5 };
    if (state.caseIdField && k === state.caseIdField) return { wch: 10 };
    if (k.endsWith('— note')) return { wch: 28 };
    return { wch: 12 };
  });
  // Freeze the identifier columns (# and Case ID) so they stay visible when scrolling right
  const frozenCols = state.caseIdField ? 2 : 1;
  ws['!freeze'] = { xSplit: frozenCols, ySplit: 1 };
  // XLSX.js uses '!freeze' on some versions, 'frozen' panes via 'sheetView' on others.
  // Add the standard sheetView/pane configuration too for maximum compatibility.
  ws['!views'] = [{ state: 'frozen', xSplit: frozenCols, ySplit: 1 }];
  XLSX.utils.book_append_sheet(wb, ws, 'Full annotations');

  // ---- Sheet 2: Toggles only (no Prompt/Response/Notes — easy to scan) ----
  const toggleRows = state.conversations.map((c, ci) => {
    const ann = state.annotations[ci] || {};
    const row = { '#': ci + 1 };
    if (state.caseIdField) row[state.caseIdField] = ci + 1;
    tax.forEach((name, ti) => {
      row[name] = fmtValue(ann[ti]?.value);
    });
    return row;
  });
  const wsT = XLSX.utils.json_to_sheet(toggleRows);
  const tHeaders = Object.keys(toggleRows[0]);
  wsT['!cols'] = tHeaders.map(k => {
    if (k === '#') return { wch: 5 };
    if (state.caseIdField && k === state.caseIdField) return { wch: 10 };
    return { wch: 8 };  // narrow toggle columns since they only hold Yes/No
  });
  wsT['!views'] = [{ state: 'frozen', xSplit: frozenCols, ySplit: 1 }];
  XLSX.utils.book_append_sheet(wb, wsT, 'Toggles');

  // ---- Sheet 3: Summary (Yes/No/Blank counts per taxonomy item) ----
  const summary = tax.map((name, ti) => {
    let yes = 0, no = 0, blank = 0;
    state.conversations.forEach((_, ci) => {
      const v = state.annotations[ci]?.[ti]?.value;
      if (v === 'yes') yes++;
      else if (v === 'no') no++;
      else blank++;
    });
    return { 'Taxonomy item': name, 'Yes': yes, 'No': no, 'Blank': blank };
  });
  const ws2 = XLSX.utils.json_to_sheet(summary);
  ws2['!cols'] = [{wch: 60}, {wch: 8}, {wch: 8}, {wch: 8}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Summary');

  const filename = 'annotations-' + new Date().toISOString().slice(0,10) + '.xlsx';
  XLSX.writeFile(wb, filename);
  toast('Exported ' + filename);
}

/* ---------- Markdown ---------- */
function renderMarkdown(text) {
  try {
    if (typeof marked === 'undefined') return escapeHtml(text);
    marked.setOptions({
      breaks: true,      // single \n becomes <br>
      gfm: true,         // tables, strikethrough, etc.
      mangle: false,
      headerIds: false,
    });
    const html = marked.parse(String(text ?? ''));
    if (typeof DOMPurify !== 'undefined') {
      return DOMPurify.sanitize(html);
    }
    return html;
  } catch (e) {
    return escapeHtml(text);
  }
}

function setConversationNote(value) {
  state.conversationNotes[state.currentIndex] = value;
  scheduleSave();
}

/* ---------- Helpers ---------- */
function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }
function pad(n, w = 3) { return String(n).padStart(w, '0'); }
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + ' min ago';
  if (diff < 86400) return Math.floor(diff/3600) + ' hr ago';
  return d.toLocaleDateString();
}

/* ---------- Keyboard ---------- */
document.addEventListener('keydown', (e) => {
  if (state.view !== 'annotate') return;
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'textarea' || tag === 'input' || tag === 'select') return;
  if (e.key === 'ArrowLeft') { goTo(state.currentIndex - 1); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { goTo(state.currentIndex + 1); e.preventDefault(); }
});

/* ---------- Boot ---------- */
(async function init() {
  const saved = await loadSession();
  if (saved && saved.conversations && saved.conversations.length) {
    renderSetup(saved);
  } else {
    renderSetup(null);
  }
})();
</script>
</body>
</html>
