    // Fresh: drop any existing edit state for the Draft slot
    if (state.sectionEdits) delete state.sectionEdits['Draft'];
  }
}

/** Originals are saved once per conversation and never change after upload. */
function getOriginalHtmlForConv(convIdx, fallbackHtml) {
  if (typeof state._originalsByConv !== 'object' || state._originalsByConv === null) {
    state._originalsByConv = {};
  }
  if (state._originalsByConv[convIdx] !== undefined) {
    return state._originalsByConv[convIdx];
  }
  state._originalsByConv[convIdx] = fallbackHtml;
  return fallbackHtml;
}

/** Parse an instruction-chain string into an array of individual instructions.
 * Tries (in order): numbered prefixes ("1.", "2)", "Prompt N:"), blank-line
 * separators, then plain newlines if multiple non-trivial lines exist. */
function parseInstructionChain(raw) {
  if (!raw || !raw.trim()) return [];
  const text = raw.trim();
  // Numbered patterns first: "1. ..." or "1) ..." or "Prompt 1:" etc.
  if (/^(\d+[.)]|prompt\s*\d+\s*:|turn\s*\d+\s*:|user\s*:)/im.test(text)) {
    return text.split(/(?=^(?:\d+[.)]|prompt\s*\d+\s*:|turn\s*\d+\s*:|user\s*:))/im)
      .map(s => s.replace(/^(?:\d+[.)]\s*|prompt\s*\d+\s*:\s*|turn\s*\d+\s*:\s*|user\s*:\s*)/i, '').trim())
      .filter(Boolean);
  }
  // Blank-line separators
  const byBlanks = text.split(/\n\s*\n/).map(s => s.trim()).filter(Boolean);
  if (byBlanks.length > 1) return byBlanks;
  // Fall back to plain newlines if multiple substantive lines exist
  const byLines = text.split(/\n/).map(s => s.trim()).filter(Boolean);
  if (byLines.length > 1) return byLines;
  return [text];
}

async function resumeSession() {
  const s = await loadSession();
  if (!s) return;
  state.promptsHeaders = s.promptsHeaders || [];
  state.promptCol = s.promptCol;
  state.responseCol = s.responseCol;
  state.instructionsCol = s.instructionsCol || null;
  state.draftInputMode = s.draftInputMode || 'excel';
  state.draftFiles = s.draftFiles || [];
  state.draftCases = s.draftCases || [];
  state.taxonomyItems = s.taxonomyItems || [];
  state.taxonomySectionMap = s.taxonomySectionMap || [];
  state.taxonomySectionNames = s.taxonomySectionNames || [];
  state.taxonomyCategories = s.taxonomyCategories || [];
  state.taxonomyCategoryDetails = s.taxonomyCategoryDetails || {};
  state.isMultiSheet = !!s.isMultiSheet;
  state.activeSectionTab = s.activeSectionTab || (state.taxonomySectionNames[0] || null);
  state.activeCategoryFilter = s.activeCategoryFilter || null;
  state.caseIdField = s.caseIdField || null;
  state.inputMode = s.inputMode || 'excel';
  state.caseName = s.caseName || null;
  state.sectionDocuments = s.sectionDocuments || {};
  state.sectionEdits = s.sectionEdits || {};
  state._draftEditsByConv = s._draftEditsByConv || {};
  state._originalsByConv = s._originalsByConv || {};
  state.conversations = s.conversations || [];
  state.annotations = s.annotations || {};
  state.conversationNotes = s.conversationNotes || {};
  state.instructionChains = s.instructionChains || {};
  state.currentIndex = s.currentIndex || 0;
  state.view = 'annotate';
  // For OraDraft (multi-case Excel that was switched to docx-mode after start),
  // repopulate the synthetic draft document for the active conversation.
  if (state.inputMode === 'docx' && state.conversations.length > 0 && state.taxonomySectionNames[0] === 'Draft') {
    populateSyntheticDocForConv(state.currentIndex);
  }
  renderAnnotate();
}

async function discardSession() {
  await clearSession();
  toast('Saved session cleared');
  renderSetup(null);
}

async function confirmReset() {
  if (!confirm('Reset everything? Your annotations will be lost.')) return;
  await clearSession();
  Object.assign(state, {
    view: 'setup',
    promptsFile: null, promptsRows: [], promptsHeaders: [],
    promptCol: null, responseCol: null, instructionsCol: null,
    draftInputMode: 'excel', draftFiles: [], draftCases: [],
    taxonomyFile: null, taxonomyItems: [], taxonomyRawItems: [],
    taxonomySectionMap: [], taxonomySectionNames: [],
    taxonomyCategories: [], taxonomyCategoryDetails: {},
    isMultiSheet: false, activeSectionTab: null,
    activeCategoryFilter: null,
    caseIdField: null, caseIdAutoDetected: false,
    conversations: [], annotations: {}, conversationNotes: {},
    instructionChains: {},
    _draftEditsByConv: {}, _originalsByConv: {},
    currentIndex: 0, filter: 'all',
    inputMode: 'excel', caseName: null,
    sectionDocuments: {}, docxAssignments: {}, pendingDocxFiles: [],
    editingSection: null, sectionEdits: {}, showHistory: false, selectedHistoryTs: null,
    showInlineDiff: false, snapshotDiffView: false,
  });
  renderSetup(null);
}

/* ---------- Render: Annotate ---------- */

/** Build the inside of the conv-body panel.
 * - Excel mode: shows prompt + response + overall notes.
 * - Docx mode: shows the document mapped to the active section + overall notes.
 *   In docx mode the section is editable: a pencil icon flips it into a contenteditable,
 *   edits are debounced-snapshotted, and a history panel can be toggled. */
function renderConvBody(conv, isDocxMode) {
  let blocks = '';
  if (isDocxMode) {
    const sec = state.activeSectionTab;
    const doc = state.sectionDocuments[sec];
    const editState = state.sectionEdits[sec] || { currentHtml: doc?.html || '', history: [] };
    const isEditing = state.editingSection === sec;
    const hasEdits = doc && editState.currentHtml !== doc.originalHtml;
    const historyCount = editState.history.length;
    const previewingHistory = state.showHistory && state.selectedHistoryTs !== null;
    const showingDiff = state.showInlineDiff && hasEdits && !isEditing && !previewingHistory;
    let displayHtml = editState.currentHtml || doc?.html || '';
    if (previewingHistory) {
      if (state.selectedHistoryTs === 0) {
        displayHtml = doc?.originalHtml || '';
      } else {
        const snap = editState.history.find(h => h.ts === state.selectedHistoryTs);
        if (snap) displayHtml = snap.html;
      }
    }
    blocks = `
      <div class="conv-block">
        <div class="conv-label response doc-toolbar">
          <span class="doc-label-text">
            ${escapeHtml(sec || 'Document')}
            ${doc ? `<span class="docx-filename-tag">${escapeHtml(doc.filename)}</span>` : ''}
            ${hasEdits ? '<span class="edit-tag">edited</span>' : ''}
          </span>
          <div class="doc-toolbar-actions">
            ${hasEdits && !isEditing ? `
              <button class="doc-tool-btn ${showingDiff ? 'active' : ''}" onclick="toggleInlineDiff()" title="See edits inline vs original">
                ${showingDiff ? '✓ Showing changes' : '⇄ Show changes'}
              </button>
            ` : ''}
            ${historyCount > 0 ? `
              <button class="doc-tool-btn ${state.showHistory ? 'active' : ''}" onclick="toggleHistory()" title="Show version history">
                History · <span class="history-count">${historyCount}</span>
              </button>
            ` : ''}
            ${doc ? (isEditing ? `
              <button class="doc-tool-btn primary" onclick="exitEditMode()" title="Finish editing">Done</button>
            ` : `
              <button class="doc-tool-btn" onclick="enterEditMode()" title="Edit this document">✎ Edit</button>
            `) : ''}
          </div>
        </div>
        ${doc ? (isEditing ? `
          <div class="conv-text editor"
               contenteditable="true"
               oninput="onDocumentInput(this)"
               onblur="onDocumentBlur()">${displayHtml}</div>
          <div class="editor-hint">Click outside or press <span class="kbd">Done</span> to finish. All edits are saved automatically and snapshotted as history versions.</div>
        ` : showingDiff ? `
          <div class="conv-text inline-diff-view">
            ${renderInlineDiffHtml(doc.originalHtml, editState.currentHtml)}
          </div>
          <div class="diff-legend">
            <span class="diff-legend-item"><del class="diff-del">deleted text</del> was removed from the original</span>
            <span class="diff-legend-item"><ins class="diff-ins">inserted text</ins> was added in your edits</span>
          </div>
        ` : `
          <div class="conv-text ${displayHtml ? '' : 'empty'} ${previewingHistory ? 'previewing-history' : ''}">${
            previewingHistory && state.snapshotDiffView
              ? renderInlineDiffHtml(doc.originalHtml, displayHtml)
              : (displayHtml || '(no document mapped to this section — go back and assign one)')
          }</div>
          ${previewingHistory ? `
            <div class="history-preview-banner">
              <span>Previewing ${state.selectedHistoryTs === 0 ? 'original' : 'snapshot from ' + formatTime(new Date(state.selectedHistoryTs).toISOString())}.</span>
              ${state.selectedHistoryTs !== 0 ? `
                <button class="link-btn ${state.snapshotDiffView ? 'active' : ''}" onclick="toggleSnapshotDiffView()">
                  ${state.snapshotDiffView ? '◉ Showing changes vs original' : '○ Show changes vs original'}
                </button>
              ` : ''}
              <button class="link-btn" onclick="restoreSnapshot(${state.selectedHistoryTs})">
                ${state.selectedHistoryTs === 0 ? 'Revert all edits' : 'Restore this version'}
              </button>
              <button class="link-btn" onclick="exitHistoryPreview()">Back to current</button>
            </div>
            ${state.snapshotDiffView && state.selectedHistoryTs !== 0 ? `
              <div class="diff-legend">
                <span class="diff-legend-item"><del class="diff-del">deleted text</del> removed compared to original</span>
                <span class="diff-legend-item"><ins class="diff-ins">inserted text</ins> added by this snapshot</span>
              </div>
            ` : ''}
          ` : ''}
        `) : `
          <div class="conv-text empty">(no document mapped to this section — go back and assign one)</div>
        `}
      </div>
      ${state.showHistory && doc ? renderHistoryPanel(sec, editState) : ''}
    `;
  } else {
    blocks = `
      <div class="conv-block">
        <div class="conv-label prompt">Prompt</div>
        <div class="conv-text ${conv.prompt.trim() ? '' : 'empty'}">${conv.prompt.trim() ? renderMarkdown(conv.prompt) : '(empty)'}</div>
      </div>
      <div class="conv-block">
        <div class="conv-label response">Response</div>
        <div class="conv-text ${conv.response.trim() ? '' : 'empty'}">${conv.response.trim() ? renderMarkdown(conv.response) : '(empty)'}</div>
      </div>
    `;
  }
  return blocks + renderInstructionChainBlock() + `
    <div class="conv-block notes-block">
      <div class="conv-label">Overall notes</div>
      <textarea class="conv-notes-input"
        placeholder="General notes about this case — things that span multiple categories, overall quality, edge cases, anything worth flagging…"
        oninput="setConversationNote(this.value)">${escapeHtml(state.conversationNotes[state.currentIndex] || '')}</textarea>
    </div>
  `;
}

/** Renders the instruction-chain block: the sequence of prompts the user gave
 * during drafting (initial prompt + follow-up adjustments). When the dataset
 * doesn't include an instructions column, the annotator can add them manually. */
function renderInstructionChainBlock() {
  const idx = state.currentIndex;
  const conv = state.conversations[idx];
  const chain = state.instructionChains[idx] || [];
  const hasData = chain.length > 0;
  const fromDocx = state.draftInputMode === 'docx-pairs' && conv?.promptsFilename;
  const fromColumn = !!state.instructionsCol;
  const sourceLabel = fromDocx ? `from ${conv.promptsFilename}` :
                      fromColumn ? 'auto-imported from column' :
                      'manually editable';
  return `
    <div class="conv-block instruction-chain-block">
      <div class="conv-label">
        Instruction chain
        <span class="instruction-meta">
          ${hasData ? `${chain.length} instruction${chain.length === 1 ? '' : 's'}` : 'none recorded'}
          · ${escapeHtml(sourceLabel)}
        </span>
      </div>
      ${hasData ? `
        <div class="instruction-list">
          ${chain.map((text, i) => `
            <div class="instruction-item">
              <div class="instruction-num">${i + 1}</div>
              <textarea class="instruction-text" rows="2"
                placeholder="Instruction ${i + 1}…"
                oninput="updateInstruction(${i}, this.value)">${escapeHtml(text)}</textarea>
              <button class="instruction-remove" onclick="removeInstruction(${i})" title="Remove">×</button>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <button class="instruction-add" onclick="addInstruction()">
        + Add ${hasData ? 'another instruction' : 'first instruction'}
      </button>
    </div>
  `;
}

function updateInstruction(i, value) {
  const idx = state.currentIndex;
  if (!state.instructionChains[idx]) state.instructionChains[idx] = [];
  state.instructionChains[idx][i] = value;
  scheduleSave();
}

function removeInstruction(i) {
  const idx = state.currentIndex;
  if (!state.instructionChains[idx]) return;
  state.instructionChains[idx].splice(i, 1);
  scheduleSave();
  refreshDocBody();
}

function addInstruction() {
  const idx = state.currentIndex;
  if (!state.instructionChains[idx]) state.instructionChains[idx] = [];
  state.instructionChains[idx].push('');
  scheduleSave();
  refreshDocBody();
  // Focus the newly added textarea
  requestAnimationFrame(() => {
    const items = document.querySelectorAll('.instruction-text');
    if (items.length) items[items.length - 1].focus();
  });
}

/** Renders the history side-panel for a section. */
function renderHistoryPanel(section, editState) {
  const doc = state.sectionDocuments[section];
  const items = editState.history.slice().reverse();   // newest first
  // Compute "+N / -M" stats vs the original baseline for each snapshot
  const originalHtml = doc?.originalHtml || '';
  const currentStats = diffStats(originalHtml, editState.currentHtml);
  return `
    <div class="history-panel">
      <div class="history-panel-header">
        Version history
        <button class="link-btn" onclick="toggleHistory()" style="margin-left:auto;">Close</button>
      </div>
      <div class="history-list">
        <div class="history-item ${state.selectedHistoryTs === null && !state.showHistory ? '' : (state.selectedHistoryTs === null ? 'active' : '')}"
             onclick="exitHistoryPreview()">
          <div class="history-item-title">Current version</div>
          <div class="history-item-meta">
            ${items.length === 0 ? 'No edits yet' : 'Latest edit'}
            ${(currentStats.added || currentStats.removed) ? `
              <span class="diff-stat-add">+${currentStats.added}</span>
              <span class="diff-stat-rem">−${currentStats.removed}</span>
            ` : ''}
          </div>
        </div>
        ${items.map(s => {
          const stats = diffStats(originalHtml, s.html);
          return `
          <div class="history-item ${state.selectedHistoryTs === s.ts ? 'active' : ''}"
               onclick="previewSnapshot(${s.ts})">
            <div class="history-item-title">${escapeHtml(s.summary || 'Edit')}</div>
            <div class="history-item-meta">
              ${formatTime(new Date(s.ts).toISOString())}
              ${(stats.added || stats.removed) ? `
                <span class="diff-stat-add">+${stats.added}</span>
                <span class="diff-stat-rem">−${stats.removed}</span>
              ` : ''}
            </div>
          </div>
        `;}).join('')}
        <div class="history-item ${state.selectedHistoryTs === 0 ? 'active' : ''}"
             onclick="previewSnapshot(0)">
          <div class="history-item-title">Original</div>
          <div class="history-item-meta">As uploaded · ${escapeHtml(doc.filename || '')}</div>
        </div>
      </div>
    </div>
  `;
}

function renderAnnotate() {
  document.getElementById('topbar').style.display = 'block';
  updateProgress();

  const root = document.getElementById('app');
  const conv = state.conversations[state.currentIndex];
  if (!conv) {
    root.innerHTML = '<div class="container">No conversation at this index.</div>';
    return;
  }

  // OraDraft is always multi-case Excel input — show case-id badge + arrow nav
  const isDocxMode = state.inputMode === 'docx';  // kept for renderConvBody contract

  root.innerHTML = `
    <div class="container">
      <div class="work-layout">
        <div class="conv-panel">
          <div class="conv-header">
            <div class="conv-num">
              ${state.draftInputMode === 'docx-pairs' && conv.caseId ? `
                <span class="case-badge-label">Case</span>
                <span class="case-badge">${escapeHtml(conv.caseId)}</span>
                <em style="margin-left:8px;">${state.currentIndex + 1} / ${state.conversations.length}</em>
              ` : state.caseIdField ? `
                <span class="case-badge-label">${escapeHtml(state.caseIdField)}</span>
                <span class="case-badge">${pad(state.currentIndex + 1)}</span>
                <em style="margin-left:8px;">${state.currentIndex + 1} / ${state.conversations.length}</em>
              ` : `
                <span>${pad(state.currentIndex + 1)}</span>
                <em> / ${state.conversations.length}</em>
              `}
            </div>
            <div class="conv-nav">
              <button class="nav-btn" onclick="goTo(0)" ${state.currentIndex===0?'disabled':''} title="First">⇤</button>
              <button class="nav-btn" onclick="goTo(state.currentIndex-1)" ${state.currentIndex===0?'disabled':''} title="Previous (←)">←</button>
              <input class="conv-jump" type="number" min="1" max="${state.conversations.length}"
                value="${state.currentIndex+1}" onchange="goTo(parseInt(this.value)-1)" />
              <button class="nav-btn" onclick="goTo(state.currentIndex+1)" ${state.currentIndex===state.conversations.length-1?'disabled':''} title="Next (→)">→</button>
              <button class="nav-btn" onclick="goTo(state.conversations.length-1)" ${state.currentIndex===state.conversations.length-1?'disabled':''} title="Last">⇥</button>
            </div>
          </div>
          <div class="conv-body" id="conv-body">
            ${renderConvBody(conv, isDocxMode)}
          </div>
        </div>

        <div class="tax-panel">
          <div class="tax-summary" id="tax-summary"></div>
          <div id="tax-list"></div>
        </div>
      </div>

      <div class="bottom-actions">
        <span class="save-indicator" id="save-indicator">
          <span class="dot"></span><span class="label">All changes saved</span>
        </span>
        <span style="flex:1"></span>
        <button class="btn ghost small" onclick="goTo(state.currentIndex-1)" ${state.currentIndex===0?'disabled':''}>← Previous</button>
        <button class="btn small" onclick="goTo(state.currentIndex+1)" ${state.currentIndex===state.conversations.length-1?'disabled':''}>Next →</button>
      </div>
    </div>
  `;

  renderTaxonomy();
}

function renderTaxonomy() {
  const conv = state.conversations[state.currentIndex];
  const ann = state.annotations[state.currentIndex] || {};
  const items = state.taxonomyItems;

  // Per-section progress (only used when multi-sheet)
  const sectionStats = {};
  if (state.isMultiSheet) {
    for (const name of state.taxonomySectionNames) {
      sectionStats[name] = { yes: 0, no: 0, pending: 0, total: 0 };
    }
    items.forEach((_, i) => {
      const sec = state.taxonomySectionMap[i];
      if (!sec) return;
      sectionStats[sec].total++;
      const v = ann[i]?.value;
      if (v === 'yes') sectionStats[sec].yes++;
      else if (v === 'no') sectionStats[sec].no++;
      else sectionStats[sec].pending++;
    });
  }

  // Counts for the currently-visible items (respecting active section + active category)
  // Note: section filtering only applies when taxonomySectionMap is populated
  // (multi-sheet mode). In OraDraft, activeSectionTab='Draft' is set for the doc
  // editor's benefit, but the taxonomy has no per-section split.
  const hasSectionMap = state.taxonomySectionMap.length > 0;
  let yesCount = 0, noCount = 0, pendingCount = 0;
  items.forEach((_, i) => {
    if (hasSectionMap && state.activeSectionTab && state.taxonomySectionMap[i] !== state.activeSectionTab) return;
    if (state.activeCategoryFilter && state.taxonomyCategories[i] !== state.activeCategoryFilter) return;
    const v = ann[i]?.value;
    if (v === 'yes') yesCount++;
    else if (v === 'no') noCount++;
    else pendingCount++;
  });

  // Build the unique category list with per-category counts (annotation totals)
  const hasCategories = state.taxonomyCategories.length > 0;
  const categoryCounts = {};
  if (hasCategories) {
    state.taxonomyCategories.forEach((cat, i) => {
      if (!categoryCounts[cat]) categoryCounts[cat] = { total: 0, done: 0 };
      categoryCounts[cat].total++;
      const v = ann[i]?.value;
      if (v === 'yes' || v === 'no') categoryCounts[cat].done++;
    });
  }
  const categoryList = hasCategories
    ? Array.from(new Set(state.taxonomyCategories))
    : [];

  document.getElementById('tax-summary').innerHTML = `
    ${state.isMultiSheet && state.taxonomySectionNames.length > 1 ? `
      <div class="section-tabs">
        ${state.taxonomySectionNames.map(name => {
          const s = sectionStats[name];
          const isActive = state.activeSectionTab === name;
          const done = s.yes + s.no;
          const complete = done === s.total && s.total > 0;
          return `<button class="section-tab ${isActive ? 'active' : ''} ${complete ? 'complete' : ''}"
            onclick="setActiveSection('${escapeAttr(name)}')">
            <span class="section-tab-name">${escapeHtml(name)}</span>
            <span class="section-tab-count">${done}/${s.total}</span>
          </button>`;
        }).join('')}
      </div>
    ` : ''}
    ${hasCategories ? `
      <div class="category-tabs">
        <button class="category-chip ${!state.activeCategoryFilter ? 'active' : ''}"
          onclick="setActiveCategoryFilter(null)">
          All <span class="category-chip-count">${items.length}</span>
        </button>
        ${categoryList.map(cat => {
          const c = categoryCounts[cat];
          const isActive = state.activeCategoryFilter === cat;
          const complete = c.done === c.total && c.total > 0;
          const detail = state.taxonomyCategoryDetails[cat] || '';
          return `<button class="category-chip ${isActive ? 'active' : ''} ${complete ? 'complete' : ''}"
            onclick="setActiveCategoryFilter('${escapeAttr(cat)}')"
            title="${escapeAttr(detail)}">
            ${escapeHtml(cat)} <span class="category-chip-count">${c.done}/${c.total}</span>
          </button>`;
        }).join('')}
      </div>
    ` : ''}
    <div class="summary-row">
      <span class="summary-chip yes"><span class="dot"></span><b>${yesCount}</b> yes</span>
      <span class="summary-chip no"><span class="dot"></span><b>${noCount}</b> no</span>
      <span class="summary-chip pending"><span class="dot"></span><b>${pendingCount}</b> pending</span>
      <span class="spacer"></span>
      <div class="filter-toggle">
        <button class="${state.filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
        <button class="${state.filter==='pending'?'active':''}" onclick="setFilter('pending')">Pending</button>
        <button class="${state.filter==='yes'?'active':''}" onclick="setFilter('yes')">Yes</button>
        <button class="${state.filter==='no'?'active':''}" onclick="setFilter('no')">No</button>
      </div>
    </div>
  `;

  const list = document.getElementById('tax-list');
  list.innerHTML = items.map((name, i) => {
    const a = ann[i] || {};
    const v = a.value || null;
    const note = a.note || '';
    const cls = v === 'yes' ? 'yes' : v === 'no' ? 'no' : 'unset';
    const sectionOk = !hasSectionMap || !state.activeSectionTab || state.taxonomySectionMap[i] === state.activeSectionTab;
    const categoryOk = !state.activeCategoryFilter || state.taxonomyCategories[i] === state.activeCategoryFilter;
    const filterOk = !filterHides(state.filter, v);
    const hidden = (!sectionOk || !categoryOk || !filterOk) ? 'hidden' : '';
    const cat = state.taxonomyCategories[i] || '';
    const catDetail = cat ? (state.taxonomyCategoryDetails[cat] || '') : '';
    return `
      <div class="tax-item ${cls} ${hidden}" data-tax="${i}">
        <div class="tax-row">
          <div class="tax-index">${pad(i+1, 3)}</div>
          <div class="tax-name">
            ${escapeHtml(name)}
            ${cat ? `<span class="category-tag" title="${escapeAttr(catDetail)}">${escapeHtml(cat)}</span>` : ''}
          </div>
          <div class="toggle-group">
            <button class="toggle-btn yes-btn ${v==='yes'?'active':''}" onclick="setValue(${i},'yes')">Yes</button>
            <button class="toggle-btn no-btn ${v==='no'?'active':''}" onclick="setValue(${i},'no')">No</button>
          </div>
        </div>
        <div class="note-wrap">
          <textarea class="note-input" placeholder="Why did you choose this? (optional)"
            oninput="setNote(${i}, this.value)"
            rows="1">${escapeHtml(note)}</textarea>
        </div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.note-input').forEach(autoSize);
}

function setActiveCategoryFilter(cat) {
  state.activeCategoryFilter = cat;
  renderTaxonomy();
  scheduleSave();
}

function setActiveSection(name) {
  // Exit any in-progress edit on the section we're leaving
  if (state.editingSection && state.editingSection !== name) {
    flushSnapshot(state.editingSection, 'Edit session');
    state.editingSection = null;
  }
  state.showHistory = false;
  state.selectedHistoryTs = null;
  state.showInlineDiff = false;
  state.snapshotDiffView = false;
  state.showInlineDiff = false;
  state.activeSectionTab = name;
  renderTaxonomy();
  // In docx mode the conv body shows the section's document — refresh it too
  if (state.inputMode === 'docx') {
    const conv = state.conversations[state.currentIndex];
    const body = document.getElementById('conv-body');
    if (body && conv) body.innerHTML = renderConvBody(conv, true);
    const panel = document.querySelector('.conv-panel .conv-body');
    if (panel) panel.scrollTop = 0;
  }
  scheduleSave();
}

function autoSize(ta) {
  const adjust = () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 240) + 'px';
  };
  ta.addEventListener('input', adjust);
  // initial
  requestAnimationFrame(adjust);
}

function filterHides(filter, v) {
  if (filter === 'all') return false;
  if (filter === 'pending') return v === 'yes' || v === 'no';
  return v !== filter;
}

function setFilter(f) {
  state.filter = f;
  renderTaxonomy();
}

/* ---------- Annotation ops ---------- */
function setValue(taxIdx, value) {
  const ci = state.currentIndex;
  if (!state.annotations[ci]) state.annotations[ci] = {};
  if (!state.annotations[ci][taxIdx]) state.annotations[ci][taxIdx] = { value: null, note: '' };
  // Toggle off if clicking the same value
  if (state.annotations[ci][taxIdx].value === value) {
    state.annotations[ci][taxIdx].value = null;
  } else {
    state.annotations[ci][taxIdx].value = value;
  }
  scheduleSave();
  renderTaxonomy();
  updateProgress();
}

function setNote(taxIdx, value) {
  const ci = state.currentIndex;
  if (!state.annotations[ci]) state.annotations[ci] = {};
  if (!state.annotations[ci][taxIdx]) state.annotations[ci][taxIdx] = { value: null, note: '' };
  state.annotations[ci][taxIdx].note = value;
  scheduleSave();
}

function goTo(idx) {
  if (idx < 0 || idx >= state.conversations.length) return;
  // Save edits on the conversation we're leaving and rebuild synthetic doc
  // for the conversation we're going to.
  if (state.editingSection) {
    flushSnapshot(state.editingSection, 'Edit session');
    state.editingSection = null;
  }
  // Save the current draft's edit state to the per-conversation bucket
  // BEFORE we change currentIndex (otherwise we'd save to the wrong slot).
  saveDraftEditStateForCurrent();
  state.showHistory = false;
  state.selectedHistoryTs = null;
  state.showInlineDiff = false;
  state.snapshotDiffView = false;
  state.currentIndex = idx;
  populateSyntheticDocForConv(idx);
  scheduleSave();
  renderAnnotate();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress() {
  const total = state.conversations.length;
  const done = Object.keys(state.annotations).filter(i => {
    const ann = state.annotations[i];
    return state.taxonomyItems.every((_, t) => ann[t]?.value === 'yes' || ann[t]?.value === 'no');
  }).length;
  document.getElementById('prog-done').textContent = done;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-fill').style.width = total ? (done/total*100) + '%' : '0%';
  // Show the document-export button only in docx mode
  const docxBtn = document.getElementById('docx-export-btn');
  if (docxBtn) docxBtn.style.display = (state.inputMode === 'docx') ? 'inline-flex' : 'none';
}

function countAnnotated(annotations) {
  if (!annotations) return 0;
  return Object.values(annotations).filter(a =>
    Object.values(a || {}).some(v => v.value === 'yes' || v.value === 'no')
  ).length;
}

/* ---------- Export ---------- */
function exportData() {
  if (!state.conversations.length) { toast('Nothing to export yet'); return; }
  const tax = state.taxonomyItems;

  // Build column name for each taxonomy item — prefixed with section if multi-sheet
  const colNameFor = (i) => {
    const sec = state.taxonomySectionMap[i];
    return sec ? `${sec} :: ${tax[i]}` : tax[i];
  };

  const fmtValue = (v) => v === 'yes' ? 'Yes' : v === 'no' ? 'No' : '';

  // OraDraft uses synthetic-Draft mode: it sets inputMode='docx' AND has a
  // 'Draft' single-section. Both Excel rows and docx-pairs cases land here.
  const isOraDraft = state.inputMode === 'docx' &&
                     state.taxonomySectionNames[0] === 'Draft' &&
                     state.conversations.length > 0 &&
                     (state.conversations[0].original || state.conversations[0].caseId !== undefined);
  const isDocxMode = state.inputMode === 'docx' && !isOraDraft;

  // ---- Sheet 1: Full annotations ----
  const rows = state.conversations.map((c, ci) => {
    const ann = state.annotations[ci] || {};
    const row = { '#': ci + 1 };
    if (isOraDraft) {
      // Case identifier: prefer the docx-pairs caseId, fall back to numeric
      if (c.caseId) row['Case ID'] = c.caseId;
      else if (state.caseIdField) row[state.caseIdField] = ci + 1;
      // Filenames (only meaningful in docx-pairs mode)
      if (c.draftFilename) row['Draft file'] = c.draftFilename;
      if (c.promptsFilename) row['Prompts file'] = c.promptsFilename;
      // Initial prompt (Excel mode only — docx-pairs has empty c.prompt)
      if (c.prompt) row['Prompt'] = c.prompt;
      // Original AI-generated draft (plain text)
      const orig = htmlToPlainText(state._originalsByConv?.[ci] || '');
      const editState = state._draftEditsByConv?.[ci];
      const final = editState?.currentHtml ? htmlToPlainText(editState.currentHtml) : orig;
      row['Original draft'] = orig;
      row['Final draft (after edits)'] = final;
      row['Was edited'] = (orig !== final) ? 'Yes' : 'No';
      row['Edit count'] = editState?.history?.length || 0;
      // Instructions chain joined
      const chain = state.instructionChains[ci] || [];
      row['Instruction chain'] = chain.length
        ? chain.map((t, i) => `${i + 1}. ${t}`).join('\n')
        : '';
    } else if (isDocxMode) {
      row['Case'] = state.caseName || '';
      state.taxonomySectionNames.forEach(sec => {
        const doc = state.sectionDocuments[sec];
        row[sec] = doc ? htmlToPlainText(doc.html) : '';
      });
    } else {
      if (state.caseIdField) row[state.caseIdField] = ci + 1;
      row['Prompt'] = c.prompt;
      row['Response'] = c.response;
    }
    row['Overall notes'] = state.conversationNotes[ci] || '';
    tax.forEach((name, ti) => {
      const a = ann[ti] || {};
      row[colNameFor(ti)] = fmtValue(a.value);
      row[colNameFor(ti) + ' — note'] = a.note || '';
    });
    return row;
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  const headers = Object.keys(rows[0]);
  ws['!cols'] = headers.map(k => {
    if (k === 'Prompt' || k === 'Response') return { wch: 35 };
    if (k === 'Original draft' || k === 'Final draft (after edits)') return { wch: 50 };
    if (k === 'Instruction chain') return { wch: 45 };
    if (isDocxMode && state.taxonomySectionNames.includes(k)) return { wch: 50 };
    if (k === 'Case') return { wch: 30 };
    if (k === 'Overall notes') return { wch: 30 };
    if (k === '#') return { wch: 5 };
    if (state.caseIdField && k === state.caseIdField) return { wch: 10 };
    if (k.endsWith('— note')) return { wch: 28 };
    return { wch: 12 };
  });
  const frozenCols = (isDocxMode || isOraDraft) ? 2 : (state.caseIdField ? 2 : 1);
  ws['!freeze'] = { xSplit: frozenCols, ySplit: 1 };
  ws['!views'] = [{ state: 'frozen', xSplit: frozenCols, ySplit: 1 }];
  XLSX.utils.book_append_sheet(wb, ws, 'Full annotations');

  // ---- Sheet 2: Toggles only ----
  const toggleRows = state.conversations.map((c, ci) => {
    const ann = state.annotations[ci] || {};
    const row = { '#': ci + 1 };
    if (isDocxMode) row['Case'] = state.caseName || '';
    else if (state.caseIdField) row[state.caseIdField] = ci + 1;
    tax.forEach((name, ti) => {
      row[colNameFor(ti)] = fmtValue(ann[ti]?.value);
    });
    return row;
  });
  const wsT = XLSX.utils.json_to_sheet(toggleRows);
  const tHeaders = Object.keys(toggleRows[0]);
  wsT['!cols'] = tHeaders.map(k => {
    if (k === '#') return { wch: 5 };
    if (k === 'Case') return { wch: 30 };
    if (state.caseIdField && k === state.caseIdField) return { wch: 10 };
    return { wch: 8 };
  });
  wsT['!views'] = [{ state: 'frozen', xSplit: frozenCols, ySplit: 1 }];
  XLSX.utils.book_append_sheet(wb, wsT, 'Toggles');

  // ---- Sheet 3 (OraDraft only): Interaction chains ----
  if (isOraDraft) {
    const chainRows = state.conversations.map((c, ci) => {
      const chain = state.instructionChains[ci] || [];
      return chain.map((text, i) => ({
        Case: c.caseId || (ci + 1),
        'Initial prompt': i === 0 ? (c.prompt || '') : '',
        'Step': i + 1,
        'Instruction': text,
      }));
    }).flat();
    if (chainRows.length) {
      const wsC = XLSX.utils.json_to_sheet(chainRows);
      wsC['!cols'] = [{ wch: 12 }, { wch: 35 }, { wch: 6 }, { wch: 60 }];
      XLSX.utils.book_append_sheet(wb, wsC, 'Interaction chains');
    }
  }

  // ---- Sheet 4 (OraDraft only): Per-category summary ----
  if (state.taxonomyCategories.length) {
    const categories = Array.from(new Set(state.taxonomyCategories));
    const catRows = categories.map(cat => {
      const itemIdxs = state.taxonomyCategories
        .map((c, i) => c === cat ? i : -1)
        .filter(i => i >= 0);
      let yes = 0, no = 0, blank = 0;
      state.conversations.forEach((_, ci) => {
        const ann = state.annotations[ci] || {};
        itemIdxs.forEach(ti => {
          const v = ann[ti]?.value;
          if (v === 'yes') yes++;
          else if (v === 'no') no++;
          else blank++;
        });
      });
      return {
        'Category': cat,
        'Description': state.taxonomyCategoryDetails[cat] || '',
        'Items': itemIdxs.length,
        'Yes': yes,
        'No': no,
        'Blank': blank,
        'Total annotations': yes + no + blank,
        '% answered': (yes + no + blank) ? Math.round(100 * (yes + no) / (yes + no + blank)) + '%' : '0%',
      };
    });
    const wsCat = XLSX.utils.json_to_sheet(catRows);
    wsCat['!cols'] = [{ wch: 30 }, { wch: 60 }, { wch: 8 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 10 }, { wch: 10 }];
    XLSX.utils.book_append_sheet(wb, wsCat, 'Category summary');
  }

  // ---- Sheet 3: Per-section toggle sheets (only when multi-sheet) ----
  if (state.isMultiSheet) {
    for (const sectionName of state.taxonomySectionNames) {
      const sectionIdxs = [];
      tax.forEach((_, ti) => { if (state.taxonomySectionMap[ti] === sectionName) sectionIdxs.push(ti); });
      const secRows = state.conversations.map((c, ci) => {
        const ann = state.annotations[ci] || {};
        const row = { '#': ci + 1 };
        if (isDocxMode) row['Case'] = state.caseName || '';
        else if (state.caseIdField) row[state.caseIdField] = ci + 1;
        sectionIdxs.forEach(ti => {
          row[tax[ti]] = fmtValue(ann[ti]?.value);
          row[tax[ti] + ' — note'] = ann[ti]?.note || '';
        });
        return row;
      });
      if (!secRows.length) continue;
      const wsS = XLSX.utils.json_to_sheet(secRows);
      const sHeaders = Object.keys(secRows[0]);
      wsS['!cols'] = sHeaders.map(k => {
        if (k === '#') return { wch: 5 };
        if (k === 'Case') return { wch: 30 };
        if (state.caseIdField && k === state.caseIdField) return { wch: 10 };
        if (k.endsWith('— note')) return { wch: 28 };
        return { wch: 10 };
      });
      wsS['!views'] = [{ state: 'frozen', xSplit: frozenCols, ySplit: 1 }];
      // Sheet name max 31 chars in Excel
      const safeName = sectionName.length > 31 ? sectionName.slice(0, 31) : sectionName;
      XLSX.utils.book_append_sheet(wb, wsS, safeName);
    }
  }

  // ---- Summary sheet ----
  const summary = tax.map((name, ti) => {
    let yes = 0, no = 0, blank = 0;
    state.conversations.forEach((_, ci) => {
      const v = state.annotations[ci]?.[ti]?.value;
      if (v === 'yes') yes++;
      else if (v === 'no') no++;
      else blank++;
    });
    const row = {};
    if (state.isMultiSheet) row['Section'] = state.taxonomySectionMap[ti] || '';
    row['Taxonomy item'] = name;
    row['Yes'] = yes;
    row['No'] = no;
    row['Blank'] = blank;
    return row;
  });
  const ws2 = XLSX.utils.json_to_sheet(summary);
  ws2['!cols'] = state.isMultiSheet
    ? [{wch: 22}, {wch: 60}, {wch: 8}, {wch: 8}, {wch: 8}]
    : [{wch: 60}, {wch: 8}, {wch: 8}, {wch: 8}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Summary');

  const filename = 'annotations-' + new Date().toISOString().slice(0,10) + '.xlsx';
  XLSX.writeFile(wb, filename);
  toast('Exported ' + filename);
}

/* ---------- Markdown ---------- */
function renderMarkdown(text) {
  try {
    if (typeof marked === 'undefined') return escapeHtml(text);
    marked.setOptions({
      breaks: true,      // single \n becomes <br>
      gfm: true,         // tables, strikethrough, etc.
      mangle: false,
      headerIds: false,
    });
    const html = marked.parse(String(text ?? ''));
    if (typeof DOMPurify !== 'undefined') {
      return DOMPurify.sanitize(html);
    }
    return html;
  } catch (e) {
    return escapeHtml(text);
  }
}

function setConversationNote(value) {
  state.conversationNotes[state.currentIndex] = value;
  scheduleSave();
}

/* ---------- Document editing & version history (docx mode only) ---------- */

const MAX_HISTORY_PER_SECTION = 30;       // cap to keep storage bounded
const SNAPSHOT_DEBOUNCE_MS = 2500;        // idle time before a snapshot is captured
const SNAPSHOT_MIN_CHAR_DELTA = 80;       // OR this many chars changed since last snapshot

let snapshotTimers = {};   // per-section debounce timers

/** Ensure the edit-state slot exists for a section. */
function _ensureEditState(section) {
  if (!state.sectionEdits[section]) {
    const doc = state.sectionDocuments[section];
    state.sectionEdits[section] = {
      currentHtml: doc?.html || '',
      history: [],
    };
  }
  return state.sectionEdits[section];
}

function enterEditMode() {
  if (!state.activeSectionTab) return;
  if (state.showHistory) state.showHistory = false;
  state.editingSection = state.activeSectionTab;
  state.selectedHistoryTs = null;
  _ensureEditState(state.activeSectionTab);
  refreshDocBody();
  // Move focus to the editor for immediate typing
  requestAnimationFrame(() => {
    const ed = document.querySelector('.conv-text.editor');
    if (ed) ed.focus();
  });
}

function exitEditMode() {
  if (state.editingSection) {
    // Capture a final snapshot if there's a pending unflushed edit
    flushSnapshot(state.editingSection, 'Edit session');
  }
  state.editingSection = null;
  refreshDocBody();
}

function onDocumentInput(el) {
  const section = state.editingSection;
  if (!section) return;
  const edit = _ensureEditState(section);
  edit.currentHtml = el.innerHTML;
  scheduleSave();
  // Debounced snapshot
  clearTimeout(snapshotTimers[section]);
  snapshotTimers[section] = setTimeout(() => maybeSnapshot(section), SNAPSHOT_DEBOUNCE_MS);
}

function onDocumentBlur() {
  if (state.editingSection) {
    flushSnapshot(state.editingSection, 'Edit session');
  }
}

/** Capture a snapshot if the current content differs meaningfully from the last
 * snapshot (or from the original baseline if no snapshots exist yet). */
function maybeSnapshot(section) {
  const edit = state.sectionEdits[section];
  if (!edit) return;
  const last = edit.history.length ? edit.history[edit.history.length - 1].html
                                   : (state.sectionDocuments[section]?.originalHtml || '');
  if (last === edit.currentHtml) return;
  // Only snapshot if at least N characters changed (or we have no history yet)
  const deltaChars = Math.abs((edit.currentHtml || '').length - (last || '').length);
  if (edit.history.length > 0 && deltaChars < SNAPSHOT_MIN_CHAR_DELTA) return;
  pushSnapshot(section, autoSummarize(last, edit.currentHtml));
}

/** Force a snapshot regardless of size — used when leaving edit mode. */
function flushSnapshot(section, summary) {
  const edit = state.sectionEdits[section];
  if (!edit) return;
  const last = edit.history.length ? edit.history[edit.history.length - 1].html
                                   : (state.sectionDocuments[section]?.originalHtml || '');
  if (last === edit.currentHtml) return;
  pushSnapshot(section, summary || autoSummarize(last, edit.currentHtml));
}

function pushSnapshot(section, summary) {
  const edit = state.sectionEdits[section];
  edit.history.push({
    ts: Date.now(),
    html: edit.currentHtml,
    summary,
  });
  // Cap history so storage doesn't grow unbounded. Drop oldest, but always
  // keep the very first edit so the user can see "first change made".
  while (edit.history.length > MAX_HISTORY_PER_SECTION) {
    edit.history.splice(1, 1);
  }
  scheduleSave();
  // If we're not actively editing, do a full refresh so the toolbar / history
  // count updates. While editing, only refresh the toolbar so we don't
  // re-render the editor (which would lose the cursor).
  if (state.editingSection !== section) {
    refreshDocBody();
  } else {
    refreshDocToolbar();
  }
}

/** Update just the toolbar above the editor — avoids killing the cursor. */
function refreshDocToolbar() {
  const sec = state.activeSectionTab;
  if (!sec) return;
  const doc = state.sectionDocuments[sec];
  if (!doc) return;
  const editState = state.sectionEdits[sec];
  const isEditing = state.editingSection === sec;
  const hasEdits = doc && editState && editState.currentHtml !== doc.originalHtml;
  const historyCount = editState ? editState.history.length : 0;
  const showingDiff = state.showInlineDiff && hasEdits && !isEditing;
  const toolbar = document.querySelector('.doc-toolbar');
  if (!toolbar) return;
  toolbar.innerHTML = `
    <span class="doc-label-text">
      ${escapeHtml(sec)}
      ${doc ? `<span class="docx-filename-tag">${escapeHtml(doc.filename)}</span>` : ''}
      ${hasEdits ? '<span class="edit-tag">edited</span>' : ''}
    </span>
    <div class="doc-toolbar-actions">
      ${hasEdits && !isEditing ? `
        <button class="doc-tool-btn ${showingDiff ? 'active' : ''}" onclick="toggleInlineDiff()" title="See edits inline vs original">
          ${showingDiff ? '✓ Showing changes' : '⇄ Show changes'}
        </button>
      ` : ''}
      ${historyCount > 0 ? `
        <button class="doc-tool-btn ${state.showHistory ? 'active' : ''}" onclick="toggleHistory()" title="Show version history">
          History · <span class="history-count">${historyCount}</span>
        </button>
      ` : ''}
      ${isEditing
        ? `<button class="doc-tool-btn primary" onclick="exitEditMode()" title="Finish editing">Done</button>`
        : `<button class="doc-tool-btn" onclick="enterEditMode()" title="Edit this document">✎ Edit</button>`}
    </div>
  `;
}

/** Lightweight human summary of what changed between two HTML strings, based
 * on character-count delta. Detailed diffs are computed at export time. */
function autoSummarize(before, after) {
  const a = (before || '').length;
  const b = (after || '').length;
  const delta = b - a;
  if (delta === 0) return 'Minor reformatting';
  if (delta > 0) return `+${delta} characters added`;
  return `${delta} characters removed`;
}

function toggleHistory() {
  state.showHistory = !state.showHistory;
  if (!state.showHistory) state.selectedHistoryTs = null;
  // History and inline diff are mutually exclusive views
  if (state.showHistory) state.showInlineDiff = false;
  refreshDocBody();
}

function toggleInlineDiff() {
  state.showInlineDiff = !state.showInlineDiff;
  if (state.showInlineDiff) {
    state.showHistory = false;
    state.selectedHistoryTs = null;
  }
  refreshDocBody();
}

function toggleSnapshotDiffView() {
  state.snapshotDiffView = !state.snapshotDiffView;
  refreshDocBody();
}

function previewSnapshot(ts) {
  state.selectedHistoryTs = ts;
  refreshDocBody();
}

function exitHistoryPreview() {
  state.selectedHistoryTs = null;
  state.snapshotDiffView = false;
  refreshDocBody();
}

function restoreSnapshot(ts) {
  const section = state.activeSectionTab;
  const edit = _ensureEditState(section);
  let html;
  if (ts === 0) {
    html = state.sectionDocuments[section]?.originalHtml || '';
  } else {
    const snap = edit.history.find(h => h.ts === ts);
    if (!snap) return;
    html = snap.html;
  }
  edit.currentHtml = html;
  state.selectedHistoryTs = null;
  state.showHistory = false;
  flushSnapshot(section, 'Restored from history');
  refreshDocBody();
  toast('Restored from history');
}

/** Re-render just the conversation body (cheaper than full renderAnnotate). */
function refreshDocBody() {
  const conv = state.conversations[state.currentIndex];
  const body = document.getElementById('conv-body');
  if (body && conv) body.innerHTML = renderConvBody(conv, state.inputMode === 'docx');
}

/* ---------- Docx export (with inline track-changes-style marks) ---------- */

/** Build an HTML string showing inline diff marks against an arbitrary baseline.
 * Insertions get a green <ins> tag, deletions a red <del> tag.
 * The original document's paragraph structure is preserved best-effort by
 * splitting on newline boundaries from the plain-text diff. */
/** Compute a quick summary count: how many insertions and deletions, in
 * character counts. Used for "X added · Y removed" labels. */
function diffStats(beforeHtml, afterHtml) {
  const ops = diffPlainText(beforeHtml, afterHtml);
  let added = 0, removed = 0;
  for (const op of ops) {
    if (op.type === 'insert') added += (op.text || '').length;
    else if (op.type === 'delete') removed += (op.text || '').length;
  }
  return { added, removed };
}

/** Compare two HTML strings at the plain-text level and produce a sequence of
 * diff ops: [{type: 'equal'|'insert'|'delete', text}, ...]
 * Uses diff_match_patch when available, falls back to a simple line diff. */
function diffPlainText(before, after) {
  const b = htmlToPlainText(before || '');
  const a = htmlToPlainText(after || '');
  if (typeof diff_match_patch === 'function') {
    const dmp = new diff_match_patch();
    const raw = dmp.diff_main(b, a);
    dmp.diff_cleanupSemantic(raw);
    // Some builds return tuples [op, text]; others return objects {0: op, 1: text}.
    // Index access handles both shapes without destructuring.
    return raw.map(entry => {
      const op = entry[0];
      const text = entry[1];
      return {
        type: op === 0 ? 'equal' : (op === 1 ? 'insert' : 'delete'),
        text,
      };
    });
  }
  // Fallback: paragraph-level diff
  if (b === a) return [{ type: 'equal', text: b }];
  return [{ type: 'delete', text: b }, { type: 'insert', text: a }];
}

/** Render a side-by-side / inline diff as HTML, for showing the user where the
 * edits happened. Equal text stays normal; deletions get <del>; insertions get <ins>.
 * Preserves line breaks. */
function renderInlineDiffHtml(beforeHtml, afterHtml) {
  const ops = diffPlainText(beforeHtml, afterHtml);
  let html = '<div class="inline-diff-content">';
  let hasAnyChange = false;
  for (const op of ops) {
    const escaped = escapeHtml(op.text).replace(/\n/g, '<br>');
    if (op.type === 'equal') {
      html += `<span class="diff-equal">${escaped}</span>`;
    } else if (op.type === 'insert') {
      html += `<ins class="diff-ins" title="Added">${escaped}</ins>`;
      hasAnyChange = true;
    } else if (op.type === 'delete') {
      html += `<del class="diff-del" title="Removed">${escaped}</del>`;
      hasAnyChange = true;
    }
  }
  html += '</div>';
  if (!hasAnyChange) {
    html += '<div class="diff-no-changes">No changes between this version and the original.</div>';
  }
  return html;
}

/** Build an array of docx-library Paragraph objects that visually shows the
 * diff: deletions in red strikethrough, insertions in green underline.
 * Always returns an array (possibly empty). */
function buildDocxParagraphsWithDiff(beforeHtml, afterHtml) {
  if (!window.docx) return [];
  const { Paragraph, TextRun } = window.docx;
  const ops = diffPlainText(beforeHtml, afterHtml);
  // Split into paragraphs — paragraph boundaries are newlines in our plain text.
  // We'll accumulate runs into the current paragraph, breaking on newlines that
  // appear inside 'equal' or 'insert' ops. For simplicity, we put each op's
  // text into runs split by newline and start a new paragraph on each break.
  const paragraphs = [];
  let currentRuns = [];
  const styleFor = (type) => {
    if (type === 'delete') return { color: 'C0392B', strike: true };
    if (type === 'insert') return { color: '1D4A3E', underline: { type: 'single' } };
    return {};
  };
  const flushParagraph = () => {
    paragraphs.push(new Paragraph({ children: currentRuns.length ? currentRuns : [new TextRun('')] }));
    currentRuns = [];
  };
  for (const op of ops) {
    const lines = (op.text || '').split('\n');
    for (let i = 0; i < lines.length; i++) {
      if (lines[i]) {
        currentRuns.push(new TextRun({ text: lines[i], ...styleFor(op.type) }));
      }
      if (i < lines.length - 1) flushParagraph();
    }
  }
  if (currentRuns.length) flushParagraph();
  return paragraphs;
}

/** Build paragraphs from plain text (no diff marks) — used for the clean version.
 * Always returns an array (possibly with a single empty paragraph). */
function buildDocxParagraphsPlain(html) {
  if (!window.docx) return [];
  const { Paragraph, TextRun } = window.docx;
  const text = htmlToPlainText(html || '');
  const lines = text ? text.split('\n') : [''];
  return lines.map(line =>
    new Paragraph({ children: [new TextRun(line || '')] })
  );
}

/** Export all sections as individual .docx files AND a combined .docx, all
 * inside a single .zip-equivalent (we'll trigger separate downloads since the
 * docx library doesn't zip on its own). For each section produces:
 *   - <Section>.docx                       — clean edited version
 *   - <Section>.tracked.docx               — track-changes-style diff version
 * Plus one combined <case>-combined.docx with all sections back-to-back.  */
async function exportEditedDocuments() {
  if (state.inputMode !== 'docx') { toast('Document export only available in docx mode'); return; }
  if (!window.docx) { toast('Document export library not loaded'); return; }
  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType } = window.docx;

  // OraDraft mode: one case per .docx (clean + tracked), iterate conversations
  const isOraDraft = state.taxonomySectionNames[0] === 'Draft' &&
                     state.conversations.length > 0 &&
                     (state.conversations[0].original || state.conversations[0].caseId !== undefined);
  if (isOraDraft) {
    return exportOraDraftDocuments();
  }

  const caseTag = (state.caseName || 'case').replace(/[^a-zA-Z0-9_\-]+/g, '_').slice(0, 40);

  // Pre-build combined children so a per-section failure doesn't kill it
  const combinedChildren = [];
  combinedChildren.push(new Paragraph({
    text: state.caseName || 'Structured Analysis',
    heading: HeadingLevel.TITLE,
    alignment: AlignmentType.CENTER,
  }));
  combinedChildren.push(new Paragraph({ children: [new TextRun({
    text: `Exported ${new Date().toLocaleString()}`,
    italics: true, color: '837C6C',
  })] }));
  combinedChildren.push(new Paragraph(''));

  let exportCount = 0;
  let errors = [];

  for (const section of state.taxonomySectionNames) {
    const doc = state.sectionDocuments[section];
    if (!doc) continue;
    const edit = state.sectionEdits[section];
    const currentHtml = edit ? edit.currentHtml : doc.html;

    // ---- Per-section: clean current version ----
    try {
      const cleanParas = buildDocxParagraphsPlain(currentHtml);
      const cleanDoc = new Document({
        creator: 'Annotation Studio',
        title: `${state.caseName || ''} — ${section}`,
        sections: [{ children: [
          new Paragraph({ text: section, heading: HeadingLevel.HEADING_1 }),
          new Paragraph(''),
          ...cleanParas,
        ]}],
      });
      const cleanBlob = await Packer.toBlob(cleanDoc);
      triggerDownload(cleanBlob, `${caseTag}-${slugify(section)}.docx`);
      exportCount++;
    } catch (e) {
      console.error(`[export] clean ${section} failed:`, e);
      errors.push(`${section} (clean): ${e.message}`);
    }

    // ---- Per-section: tracked (diff) version, only if edits exist ----
    if (currentHtml !== doc.originalHtml) {
      try {
        const trackedParas = buildDocxParagraphsWithDiff(doc.originalHtml, currentHtml);
        const trackedDoc = new Document({
          creator: 'Annotation Studio',
          title: `${state.caseName || ''} — ${section} (tracked changes)`,
          sections: [{ children: [
            new Paragraph({ text: `${section} — Tracked Changes`, heading: HeadingLevel.HEADING_1 }),
            new Paragraph({ children: [new TextRun({
              text: 'Deletions appear in red strikethrough; insertions appear in green underline.',
              italics: true, color: '837C6C',
            })] }),
            new Paragraph(''),
            ...trackedParas,
          ]}],
        });
        const trackedBlob = await Packer.toBlob(trackedDoc);
        triggerDownload(trackedBlob, `${caseTag}-${slugify(section)}.tracked.docx`);
        exportCount++;
      } catch (e) {
        console.error(`[export] tracked ${section} failed:`, e);
        errors.push(`${section} (tracked): ${e.message}`);
      }
    }

    // ---- Add to combined ----
    try {
      combinedChildren.push(new Paragraph({ text: section, heading: HeadingLevel.HEADING_1 }));
      combinedChildren.push(new Paragraph(''));
      const paras = buildDocxParagraphsPlain(currentHtml);
      // buildDocxParagraphsPlain might return a non-iterable in error cases — guard
      if (Array.isArray(paras)) {
        combinedChildren.push(...paras);
      }
      combinedChildren.push(new Paragraph(''));
    } catch (e) {
      console.error(`[export] combined append ${section} failed:`, e);
      errors.push(`${section} (combined): ${e.message}`);
    }
  }

  // ---- Combined doc ----
  try {
    const combinedDoc = new Document({
      creator: 'Annotation Studio',
      title: state.caseName || 'Structured Analysis',
      sections: [{ children: combinedChildren }],
    });
    const combinedBlob = await Packer.toBlob(combinedDoc);
    triggerDownload(combinedBlob, `${caseTag}-combined.docx`);
    exportCount++;
  } catch (e) {
    console.error(`[export] combined failed:`, e);
    errors.push(`Combined: ${e.message}`);
  }

  if (errors.length) {
    toast(`Exported ${exportCount} (with ${errors.length} error${errors.length > 1 ? 's' : ''} — see console)`);
  } else {
    toast(`Exported ${exportCount} document${exportCount === 1 ? '' : 's'}`);
  }
}

/** OraDraft document export: iterate over conversations (cases). For each
 * case, save the current edited draft (.docx) plus, if edits exist, a
 * tracked-changes version showing what the reviewer changed. */
async function exportOraDraftDocuments() {
  const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;
  let exportCount = 0;
  const errors = [];

  // Ensure the currently-active conversation's edits are flushed first
  if (state.editingSection) flushSnapshot(state.editingSection, 'Edit session');
  saveDraftEditStateForCurrent();

  for (let ci = 0; ci < state.conversations.length; ci++) {
    const conv = state.conversations[ci];
    const caseTag = (conv.caseId || `case-${ci + 1}`).replace(/[^a-zA-Z0-9_\-]+/g, '_').slice(0, 40);
    const originalHtml = state._originalsByConv?.[ci] || '';
    const editState = state._draftEditsByConv?.[ci];
    const currentHtml = editState?.currentHtml || originalHtml;
    if (!originalHtml && !currentHtml) continue;

    // Clean current version
    try {
      const cleanParas = buildDocxParagraphsPlain(currentHtml);
      const cleanDoc = new Document({
        creator: 'OraDraft Annotation Studio',
        title: `Case ${conv.caseId || (ci + 1)} — Draft`,
        sections: [{ children: [
          new Paragraph({ text: `Case ${conv.caseId || (ci + 1)} — Draft`, heading: HeadingLevel.HEADING_1 }),
          new Paragraph(''),
          ...cleanParas,
        ]}],
      });
      const blob = await Packer.toBlob(cleanDoc);
      triggerDownload(blob, `${caseTag}-draft.docx`);
      exportCount++;
    } catch (e) {
      console.error(`[export] clean case ${ci}:`, e);
      errors.push(`Case ${conv.caseId || (ci + 1)} (clean): ${e.message}`);
    }

    // Tracked-changes version if edits exist
    if (currentHtml !== originalHtml && originalHtml) {
      try {
        const trackedParas = buildDocxParagraphsWithDiff(originalHtml, currentHtml);
        const trackedDoc = new Document({
          creator: 'OraDraft Annotation Studio',
          title: `Case ${conv.caseId || (ci + 1)} — Tracked Changes`,
          sections: [{ children: [
            new Paragraph({ text: `Case ${conv.caseId || (ci + 1)} — Tracked Changes`, heading: HeadingLevel.HEADING_1 }),
            new Paragraph({ children: [new TextRun({
              text: 'Deletions appear in red strikethrough; insertions appear in green underline.',
              italics: true, color: '837C6C',
            })] }),
            new Paragraph(''),
            ...trackedParas,
          ]}],
        });
        const blob = await Packer.toBlob(trackedDoc);
        triggerDownload(blob, `${caseTag}-draft.tracked.docx`);
        exportCount++;
      } catch (e) {
        console.error(`[export] tracked case ${ci}:`, e);
        errors.push(`Case ${conv.caseId || (ci + 1)} (tracked): ${e.message}`);
      }
    }
  }

  if (errors.length) {
    toast(`Exported ${exportCount} (with ${errors.length} error${errors.length === 1 ? '' : 's'} — see console)`);
  } else {
    toast(`Exported ${exportCount} document${exportCount === 1 ? '' : 's'}`);
  }
}

function slugify(s) {
  return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40);
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/** Strip HTML tags from a docx-rendered fragment so it lives nicely in a
 * spreadsheet cell. Preserves line breaks between paragraphs and list items. */
function htmlToPlainText(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  // Replace block elements with newlines before reading textContent
  tmp.querySelectorAll('p, li, h1, h2, h3, h4, h5, h6, br, tr').forEach(el => {
    el.insertAdjacentText('beforeend', '\n');
  });
  return tmp.textContent.replace(/\n{3,}/g, '\n\n').trim();
}

/* ---------- Helpers ---------- */
function escapeHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }
function pad(n, w = 3) { return String(n).padStart(w, '0'); }
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + ' min ago';
  if (diff < 86400) return Math.floor(diff/3600) + ' hr ago';
  return d.toLocaleDateString();
}

/* ---------- Keyboard ---------- */
document.addEventListener('keydown', (e) => {
  if (state.view !== 'annotate') return;
  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'textarea' || tag === 'input' || tag === 'select') return;
  if (state.inputMode === 'docx') {
    // In docx mode arrows cycle through section tabs
    const sections = state.taxonomySectionNames;
    if (!sections.length) return;
    const idx = sections.indexOf(state.activeSectionTab);
    if (e.key === 'ArrowLeft' && idx > 0) {
      setActiveSection(sections[idx - 1]); e.preventDefault();
    } else if (e.key === 'ArrowRight' && idx < sections.length - 1) {
      setActiveSection(sections[idx + 1]); e.preventDefault();
    }
    return;
  }
  if (e.key === 'ArrowLeft') { goTo(state.currentIndex - 1); e.preventDefault(); }
  else if (e.key === 'ArrowRight') { goTo(state.currentIndex + 1); e.preventDefault(); }
});

/* ---------- Boot ---------- */
(async function init() {
  const saved = await loadSession();
  if (saved && saved.conversations && saved.conversations.length) {
    renderSetup(saved);
  } else {
    renderSetup(null);
  }
})();
</script>
