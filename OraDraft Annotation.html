<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OraDraft Annotation Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<script src="https://unpkg.com/docx@9.6.1/dist/index.iife.js"></script>
<script src="https://cdn.jsdelivr.net/npm/diff-match-patch-js-browser-and-nodejs@1.0.2/diff_match_patch.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f4efe6;
    --bg-2: #ebe3d4;
    --paper: #fbf7ef;
    --ink: #1a1916;
    --ink-soft: #4a463d;
    --ink-muted: #837c6c;
    --line: #d9d0bd;
    --line-soft: #e5dcc8;
    --accent: #1d4a3e;
    --accent-soft: #d6e3dc;
    --yes: #1d4a3e;
    --yes-soft: #d6e3dc;
    --no: #8a2a1a;
    --no-soft: #efd7d0;
    --unset: #837c6c;
    --warn: #a36b1f;
    --shadow: 0 1px 0 rgba(26,25,22,.04), 0 8px 24px -12px rgba(26,25,22,.18);
    --radius: 4px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(29,74,62,.04) 0, transparent 40%),
      radial-gradient(circle at 80% 100%, rgba(163,107,31,.04) 0, transparent 40%);
    min-height: 100vh;
  }

  .display { font-family: 'Fraunces', serif; font-feature-settings: 'ss01'; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.86em; }

  /* ---------- Layout ---------- */
  .top-bar {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(14px);
    background: rgba(244,239,230,.88);
    border-bottom: 1px solid var(--line);
  }
  .top-bar-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 14px 28px;
    display: flex; align-items: center; gap: 24px;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 600; font-size: 20px;
    font-feature-settings: 'ss01';
    letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .brand::before {
    content: ""; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    display: inline-block;
  }
  .brand em { font-style: italic; color: var(--ink-soft); font-weight: 400; }

  .top-bar .spacer { flex: 1; }
  .top-bar .progress {
    display: flex; align-items: center; gap: 14px;
    font-size: 13px; color: var(--ink-soft);
  }
  .progress-bar {
    width: 200px; height: 6px; background: var(--line-soft);
    border-radius: 99px; overflow: hidden; position: relative;
  }
  .progress-bar > div {
    height: 100%; background: var(--accent);
    transition: width .3s ease;
  }
  .progress-stats { font-variant-numeric: tabular-nums; }
  .progress-stats b { color: var(--ink); font-weight: 600; }

  .container {
    max-width: 1400px; margin: 0 auto;
    padding: 28px;
  }

  /* ---------- Setup screen ---------- */
  .setup-screen {
    max-width: 760px; margin: 64px auto;
    padding: 0 28px;
  }
  .setup-hero {
    text-align: center; margin-bottom: 56px;
  }
  .setup-hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500; font-size: 64px;
    line-height: 1; letter-spacing: -0.03em;
    margin: 0 0 18px;
  }
  .setup-hero h1 em { font-style: italic; color: var(--accent); }
  .setup-hero p {
    color: var(--ink-soft); font-size: 17px; max-width: 520px;
    margin: 0 auto;
  }

  .upload-grid { display: grid; gap: 18px; margin-bottom: 32px; }

  .upload-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px;
    position: relative;
    transition: border-color .2s, transform .2s;
  }
  .upload-card.has-file {
    border-color: var(--accent);
    background: linear-gradient(180deg, var(--paper) 0%, var(--accent-soft) 200%);
  }
  .upload-card .step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .upload-card h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500; font-size: 26px;
    margin: 4px 0 6px; letter-spacing: -0.01em;
  }
  .upload-card .hint {
    color: var(--ink-soft); font-size: 14px; margin-bottom: 18px;
  }
  .upload-card .file-input {
    display: flex; align-items: center; gap: 12px;
    border: 1px dashed var(--line);
    padding: 14px 16px; border-radius: var(--radius);
    background: rgba(255,255,255,.4);
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .upload-card .file-input:hover { border-color: var(--accent); background: rgba(255,255,255,.7); }
  .upload-card.has-file .file-input {
    border-style: solid; border-color: var(--accent);
    background: rgba(255,255,255,.6);
  }
  .upload-card input[type=file] { display: none; }
  .upload-card .file-label {
    flex: 1; font-size: 14px;
  }
  .upload-card .file-label .name { font-weight: 500; }
  .upload-card .file-label .stats { color: var(--ink-muted); font-size: 12px; margin-top: 2px; }
  .upload-card .check {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    opacity: 0; transition: opacity .2s;
  }
  .upload-card.has-file .check { opacity: 1; }

  .col-mapping {
    margin-top: 14px; display: none;
    background: rgba(255,255,255,.5);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 13px;
  }
  .upload-card.has-file .col-mapping { display: block; }
  .col-mapping label {
    display: flex; align-items: center; gap: 10px;
    margin: 6px 0;
  }
  .col-mapping label span:first-child {
    width: 90px; color: var(--ink-soft); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.05em;
    font-family: 'JetBrains Mono', monospace;
  }
  .col-mapping select {
    flex: 1; padding: 6px 10px;
    border: 1px solid var(--line); border-radius: 3px;
    background: white; font-family: inherit; font-size: 13px;
    color: var(--ink);
  }

  .tax-preview {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .tax-preview-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 6px;
  }
  .tax-preview-list {
    margin: 0; padding-left: 22px;
    font-size: 13px; color: var(--ink-soft);
    line-height: 1.6;
  }
  .tax-preview-list li.more {
    list-style: none; margin-left: -22px;
    color: var(--ink-muted); font-style: italic;
    font-size: 12px;
  }
  .tax-preview-list li.case-id-preview {
    list-style: none; margin-left: -22px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 6px;
  }
  .case-id-tag {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 6px;
    vertical-align: 1px;
  }
  /* Case identifier badge in the conversation header */
  .case-badge {
    background: var(--accent);
    color: white;
    padding: 4px 10px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .case-badge-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
  }

  /* Docx mode: filename tag next to the section header in the conv body */
  .docx-filename-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
    text-transform: none;
    letter-spacing: 0;
    margin-left: 10px;
    background: var(--bg-2);
    padding: 1px 6px;
    border-radius: 2px;
  }

  /* Docx mode: file → section mapping panel on the setup screen */
  .docx-mapping {
    display: flex; flex-direction: column; gap: 6px;
    margin: 4px 0 8px;
  }
  .docx-row {
    display: grid;
    grid-template-columns: 140px 1fr 60px;
    align-items: center;
    gap: 10px;
    padding: 6px 10px;
    background: rgba(255,255,255,.5);
    border-radius: 3px;
    font-size: 13px;
  }
  .docx-row-section {
    font-weight: 500; color: var(--ink);
  }
  .docx-row-select {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: white;
    font-family: inherit;
    font-size: 12.5px;
    color: var(--ink);
  }
  .docx-row-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-align: right;
  }
  .docx-row-status.ok { color: var(--accent); }
  .docx-row-status.missing { color: var(--ink-muted); font-style: italic; }
  .case-name-input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: white;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
  }
  .case-name-input:focus {
    outline: none; border-color: var(--accent);
  }

  .docx-warning {
    margin-top: 8px;
    padding: 8px 10px;
    background: rgba(163,107,31,.08);
    border-left: 2px solid var(--warn);
    color: var(--warn);
    font-size: 12px;
    border-radius: 2px;
  }

  /* ---------- Document editing & history ---------- */
  .doc-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .doc-label-text {
    display: flex; align-items: center; gap: 8px;
  }
  .doc-toolbar-actions {
    display: flex; align-items: center; gap: 6px;
  }
  .doc-tool-btn {
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 4px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
    border-radius: 3px;
    cursor: pointer;
    transition: all .15s;
  }
  .doc-tool-btn:hover { color: var(--ink); border-color: var(--ink-soft); }
  .doc-tool-btn.active {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .doc-tool-btn.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .history-count {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 10px;
    margin-left: 2px;
  }
  .doc-tool-btn.active .history-count {
    background: rgba(255,255,255,.2); color: white;
  }
  .edit-tag {
    display: inline-block;
    background: rgba(163,107,31,.15);
    color: var(--warn);
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 1px 6px;
    border-radius: 2px;
  }
  .conv-text.editor {
    background: var(--paper);
    border: 1px solid var(--accent);
    outline: none;
    padding: 14px 16px;
    border-radius: var(--radius);
    min-height: 100px;
    cursor: text;
    box-shadow: 0 0 0 3px rgba(29,74,62,.08);
  }
  .conv-text.editor:focus { outline: none; }
  .conv-text.previewing-history {
    background: rgba(163,107,31,.06);
    border-left: 3px solid var(--warn);
    padding-left: 14px;
  }
  .editor-hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--ink-muted);
    font-style: italic;
  }
  .history-preview-banner {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--bg-2);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--ink-soft);
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .link-btn {
    background: none; border: none; padding: 0;
    color: var(--accent);
    font-family: inherit; font-size: inherit;
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
  }
  .link-btn:hover { color: var(--ink); }
  .link-btn.active { color: var(--ink); font-weight: 600; }

  .diff-stat-add, .diff-stat-rem {
    display: inline-block;
    margin-left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 2px;
    font-variant-numeric: tabular-nums;
  }
  .diff-stat-add {
    background: rgba(29,74,62,.12);
    color: var(--yes);
  }
  .diff-stat-rem {
    background: rgba(138,42,26,.12);
    color: var(--no);
  }

  .history-panel {
    margin: 0 -1px;
    border-top: 1px solid var(--line-soft);
    background: var(--bg-2);
    padding: 0;
  }
  .history-panel-header {
    padding: 10px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: flex; align-items: center;
    border-bottom: 1px solid var(--line-soft);
  }
  .history-list {
    max-height: 280px;
    overflow-y: auto;
  }
  .history-item {
    padding: 10px 18px;
    border-bottom: 1px solid var(--line-soft);
    cursor: pointer;
    transition: background .15s;
  }
  .history-item:hover { background: rgba(255,255,255,.5); }
  .history-item.active {
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    padding-left: 15px;
  }
  .history-item-title {
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
  }
  .history-item-meta {
    font-size: 11px;
    color: var(--ink-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  /* ---------- Inline diff view ---------- */
  .inline-diff-view {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 60vh;
    overflow-y: auto;
  }
  .inline-diff-content {
    font-size: 14px;
  }
  .diff-equal {
    color: var(--ink);
  }
  .diff-ins {
    background: rgba(29, 74, 62, 0.12);
    color: #0d3a2e;
    text-decoration: underline;
    text-decoration-color: #1d4a3e;
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
    padding: 1px 2px;
    border-radius: 2px;
  }
  .diff-del {
    background: rgba(192, 57, 43, 0.10);
    color: #8a2a1a;
    text-decoration: line-through;
    text-decoration-color: #c0392b;
    text-decoration-thickness: 2px;
    padding: 1px 2px;
    border-radius: 2px;
  }
  .diff-no-changes {
    color: var(--ink-muted);
    font-style: italic;
    text-align: center;
    padding: 20px;
  }
  .diff-legend {
    display: flex; flex-wrap: wrap; gap: 18px;
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--bg-2);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--ink-soft);
  }
  .diff-legend-item {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .diff-legend-item del, .diff-legend-item ins {
    font-size: 11px;
    padding: 1px 6px;
  }

  .setup-actions {
    display: flex; gap: 12px; align-items: center;
    margin-top: 12px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px;
    border: 1px solid var(--ink);
    background: var(--ink); color: var(--paper);
    font-family: inherit; font-size: 14px; font-weight: 500;
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform .15s, background .15s;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.ghost {
    background: transparent; color: var(--ink); border-color: var(--line);
  }
  .btn.ghost:hover:not(:disabled) { border-color: var(--ink); }
  .btn.accent {
    background: var(--accent); border-color: var(--accent);
  }
  .btn.small { padding: 8px 14px; font-size: 13px; }

  .resume-banner {
    margin-top: 24px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-left: 3px solid var(--warn);
    padding: 16px 20px; border-radius: var(--radius);
    display: flex; align-items: center; gap: 14px;
  }
  .resume-banner .icon { font-size: 20px; }
  .resume-banner .text { flex: 1; font-size: 14px; }
  .resume-banner b { color: var(--ink); }

  /* ---------- Annotate screen ---------- */
  .work-layout {
    display: grid;
    grid-template-columns: minmax(380px, 4fr) minmax(520px, 6fr);
    gap: 24px;
    align-items: start;
  }

  .conv-panel {
    position: sticky; top: 80px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    max-height: calc(100vh - 110px);
    display: flex; flex-direction: column;
  }
  .conv-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg-2);
  }
  .conv-num {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.01em;
  }
  .conv-num em { color: var(--ink-muted); font-style: italic; font-weight: 400; }
  .conv-nav { display: flex; gap: 4px; align-items: center; }
  .nav-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--line); background: var(--paper);
    border-radius: 3px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft); font-size: 14px;
    transition: all .15s;
  }
  .nav-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
  .conv-jump {
    border: 1px solid var(--line); background: var(--paper);
    border-radius: 3px; padding: 4px 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    width: 56px; text-align: center;
    color: var(--ink);
  }

  .conv-body {
    overflow-y: auto; flex: 1;
  }
  .conv-block {
    padding: 18px 20px;
    border-bottom: 1px solid var(--line-soft);
  }
  .conv-block:last-child { border-bottom: none; }
  .conv-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-muted);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .conv-label::after {
    content: ""; flex: 1; height: 1px; background: var(--line-soft);
  }
  .conv-label.prompt { color: var(--accent); }
  .conv-label.prompt::before { content: "→"; }
  .conv-label.response::before { content: "←"; }
  .conv-text {
    font-size: 14.5px; line-height: 1.6;
    word-wrap: break-word;
    color: var(--ink);
  }
  .conv-text.empty { color: var(--ink-muted); font-style: italic; }
  /* Markdown element styling inside conv-text */
  .conv-text p { margin: 0 0 10px; }
  .conv-text p:last-child { margin-bottom: 0; }
  .conv-text h1, .conv-text h2, .conv-text h3, .conv-text h4 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 14px 0 6px;
    line-height: 1.25;
  }
  .conv-text h1 { font-size: 20px; }
  .conv-text h2 { font-size: 18px; }
  .conv-text h3 { font-size: 16px; }
  .conv-text h4 { font-size: 15px; }
  .conv-text ul, .conv-text ol { margin: 6px 0 10px; padding-left: 22px; }
  .conv-text li { margin: 3px 0; }
  .conv-text li > p { margin: 0; }
  .conv-text strong { font-weight: 600; color: var(--ink); }
  .conv-text em { font-style: italic; }
  .conv-text a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
  .conv-text code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--bg-2);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .conv-text pre {
    background: var(--ink);
    color: var(--paper);
    padding: 12px 14px;
    border-radius: var(--radius);
    overflow-x: auto;
    font-size: 12.5px;
    line-height: 1.5;
    margin: 8px 0 12px;
  }
  .conv-text pre code {
    background: transparent;
    padding: 0;
    color: inherit;
    font-size: inherit;
  }
  .conv-text blockquote {
    border-left: 3px solid var(--line);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--ink-soft);
    font-style: italic;
  }
  .conv-text table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 13px;
  }
  .conv-text th, .conv-text td {
    border: 1px solid var(--line);
    padding: 6px 10px;
    text-align: left;
  }
  .conv-text th { background: var(--bg-2); font-weight: 600; }
  .conv-text hr { border: none; border-top: 1px solid var(--line); margin: 12px 0; }

  /* Overall notes block */
  .conv-block.notes-block { background: rgba(214,227,220,.25); }
  .conv-notes-input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 3px;
    padding: 10px 12px;
    font-family: inherit; font-size: 14px;
    color: var(--ink); resize: vertical;
    min-height: 70px;
    line-height: 1.55;
    transition: border-color .15s, background .15s;
  }
  .conv-notes-input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .conv-notes-input::placeholder { color: var(--ink-muted); font-style: italic; }

  /* Instruction chain block — OraDraft */
  .conv-block.instruction-chain-block {
    background: rgba(229,222,202,.25);
    border-left: 3px solid var(--accent);
  }
  .instruction-meta {
    font-size: 11px;
    color: var(--ink-muted);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-family: inherit;
    font-style: italic;
    margin-left: 8px;
  }
  .instruction-list {
    display: flex; flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
  }
  .instruction-item {
    display: flex; align-items: flex-start;
    gap: 8px;
  }
  .instruction-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .instruction-text {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 3px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    resize: vertical;
    line-height: 1.5;
    transition: border-color .15s, background .15s;
  }
  .instruction-text:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .instruction-text::placeholder {
    color: var(--ink-muted);
    font-style: italic;
  }
  .instruction-remove {
    width: 22px; height: 22px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink-muted);
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 4px;
    transition: all .15s;
  }
  .instruction-remove:hover {
    color: var(--no);
    border-color: var(--no);
  }
  .instruction-add {
    background: none;
    border: 1px dashed var(--line);
    color: var(--ink-soft);
    padding: 8px 12px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    width: 100%;
    transition: all .15s;
  }
  .instruction-add:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--paper);
  }
  .view-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    margin-left: auto;
    font-size: 11px; color: var(--ink-muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .view-toggle input { margin: 0; }

  /* ---------- Taxonomy panel ---------- */
  .tax-panel { display: flex; flex-direction: column; gap: 10px; }
  .tax-summary {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 0;
    font-size: 13px;
    overflow: hidden;
  }
  .summary-row {
    display: flex; align-items: center; gap: 18px;
    padding: 14px 18px;
  }
  .section-tabs {
    display: flex; gap: 4px;
    padding: 10px 12px 0;
    overflow-x: auto;
    border-bottom: 1px solid var(--line-soft);
    flex-wrap: nowrap;
  }
  .section-tab {
    flex-shrink: 0;
    border: 1px solid var(--line);
    border-bottom: none;
    background: var(--bg-2);
    padding: 8px 14px 10px;
    border-radius: 4px 4px 0 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    color: var(--ink-soft);
    display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    transition: all .15s;
    position: relative;
    top: 1px;
  }
  .section-tab:hover { color: var(--ink); background: var(--paper); }
  .section-tab.active {
    background: var(--paper);
    border-color: var(--line);
    color: var(--ink);
    font-weight: 500;
  }
  .section-tab.active::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 2px; background: var(--paper);
  }
  .section-tab.complete .section-tab-count {
    color: var(--yes);
  }
  .section-tab-name {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    letter-spacing: -0.005em;
  }
  .section-tab-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--ink-muted);
  }
  .section-tab.active .section-tab-count { color: var(--ink-soft); }

  .section-summary-list {
    display: flex; flex-direction: column; gap: 4px;
    margin-top: 4px;
  }
  .section-summary-item {
    display: flex; justify-content: space-between;
    padding: 6px 10px;
    background: rgba(255,255,255,.5);
    border-radius: 3px;
    font-size: 13px;
  }
  .section-summary-name {
    color: var(--ink);
    font-weight: 500;
  }
  .section-summary-count {
    color: var(--ink-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  /* Draft-pair pairing table (OraDraft docx upload) */
  .draft-pairs-list {
    display: flex; flex-direction: column;
    gap: 8px;
    margin-top: 6px;
  }
  .draft-pair-row {
    display: flex; align-items: center;
    gap: 12px;
    padding: 8px 10px;
    background: rgba(255,255,255,.5);
    border-radius: 3px;
    border-left: 2px solid var(--accent);
  }
  .draft-pair-row.incomplete {
    border-left-color: var(--warn);
    background: rgba(163,107,31,.05);
  }
  .draft-pair-case {
    flex-shrink: 0;
    min-width: 120px;
  }
  .case-id-input {
    width: 100%;
    padding: 4px 8px;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
  }
  .case-id-input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .draft-pair-files {
    flex: 1;
    display: flex; gap: 8px;
  }
  .draft-pair-slot {
    flex: 1;
    display: flex; flex-direction: column;
    gap: 2px;
  }
  .draft-pair-slot-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
  }
  .draft-pair-slot select {
    padding: 4px 6px;
    border: 1px solid var(--line);
    background: var(--paper);
    font-size: 12px;
    color: var(--ink);
    border-radius: 2px;
  }
  .summary-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-variant-numeric: tabular-nums;
  }
  .summary-chip .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .summary-chip.yes .dot { background: var(--yes); }
  .summary-chip.no .dot { background: var(--no); }
  .summary-chip.pending .dot { background: var(--line); border: 1px solid var(--ink-muted); }
  .summary-chip b { color: var(--ink); font-weight: 600; }
  .tax-summary .spacer { flex: 1; }
  .filter-toggle {
    display: flex; gap: 0; border: 1px solid var(--line);
    border-radius: 3px; overflow: hidden;
  }
  .filter-toggle button {
    border: none; background: var(--paper);
    padding: 5px 12px; font-family: inherit; font-size: 12px;
    color: var(--ink-soft); cursor: pointer;
    border-right: 1px solid var(--line);
  }
  .filter-toggle button:last-child { border-right: none; }
  .filter-toggle button.active { background: var(--ink); color: var(--paper); }

  .tax-item {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    transition: border-color .2s, box-shadow .2s;
  }
  .tax-item.yes { border-left: 3px solid var(--yes); }
  .tax-item.no { border-left: 3px solid var(--no); }
  .tax-item.unset { border-left: 3px solid transparent; }
  .tax-item.hidden { display: none; }

  /* Category UI (OraDraft) */
  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 8px;
  }
  .category-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink-soft);
    border-radius: 12px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all .15s;
  }
  .category-chip:hover {
    color: var(--ink);
    border-color: var(--ink-soft);
  }
  .category-chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .category-chip.complete {
    border-color: var(--yes);
  }
  .category-chip-count {
    background: var(--bg-2);
    color: var(--ink-muted);
    padding: 1px 5px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
  }
  .category-chip.active .category-chip-count {
    background: rgba(255,255,255,.25);
    color: white;
  }
  .category-tag {
    display: inline-block;
    background: rgba(29,74,62,.08);
    color: var(--accent);
    padding: 1px 6px;
    margin-left: 8px;
    border-radius: 2px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    cursor: help;
    white-space: nowrap;
  }

  .tax-row {
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 30px 1fr auto;
    gap: 14px; align-items: center;
  }
  .tax-index {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-muted);
    font-variant-numeric: tabular-nums;
  }
  .tax-name {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 500;
    letter-spacing: -0.005em;
    line-height: 1.3;
  }

  .toggle-group {
    display: flex; border: 1px solid var(--line);
    border-radius: 99px; overflow: hidden;
    background: var(--bg);
  }
  .toggle-btn {
    border: none; background: transparent;
    padding: 6px 18px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all .15s;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase; font-size: 11px;
  }
  .toggle-btn:hover { color: var(--ink); }
  .toggle-btn.active.yes-btn { background: var(--yes); color: white; }
  .toggle-btn.active.no-btn { background: var(--no); color: white; }

  .note-wrap {
    padding: 0 18px 14px 62px;
  }
  .note-input {
    width: 100%;
    border: 1px solid var(--line-soft);
    background: var(--bg);
    border-radius: 3px;
    padding: 10px 12px;
    font-family: inherit; font-size: 13.5px;
    color: var(--ink); resize: vertical;
    min-height: 38px;
    line-height: 1.5;
    transition: border-color .15s, background .15s;
  }
  .note-input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .note-input::placeholder { color: var(--ink-muted); font-style: italic; }

  /* ---------- Footer / actions ---------- */
  .bottom-actions {
    margin-top: 28px;
    padding: 20px 0;
    border-top: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
  }
  .save-indicator {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .save-indicator .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .save-indicator.saving .dot { background: var(--warn); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--paper);
    padding: 12px 20px; border-radius: var(--radius);
    font-size: 14px; z-index: 100;
    transition: transform .3s ease;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .error-banner {
    background: var(--no-soft); border: 1px solid var(--no);
    color: var(--no); padding: 12px 16px;
    border-radius: var(--radius); margin: 12px 0;
    font-size: 14px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .work-layout { grid-template-columns: 1fr; }
    .conv-panel { position: static; max-height: 400px; }
    .setup-hero h1 { font-size: 44px; }
    .top-bar .progress { display: none; }
    .container { padding: 18px; }
    .top-bar-inner { padding: 12px 18px; }
  }

  .kbd {
    display: inline-block;
    border: 1px solid var(--line); border-bottom-width: 2px;
    background: var(--paper); border-radius: 3px;
    padding: 1px 6px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-soft);
  }
</style>
</head>
<body>

<div id="topbar" class="top-bar" style="display:none;">
  <div class="top-bar-inner">
    <div class="brand">OraDraft <em>Annotation</em></div>
    <div class="spacer"></div>
    <div class="progress">
      <span class="progress-stats">
        <b id="prog-done">0</b> of <b id="prog-total">0</b> annotated
      </span>
      <div class="progress-bar"><div id="prog-fill" style="width:0%"></div></div>
      <button class="btn ghost small" onclick="exportData()">Export Excel</button>
      <button class="btn ghost small docx-export-btn" onclick="exportEditedDocuments()" id="docx-export-btn" style="display:none;">Export documents</button>
      <button class="btn ghost small" onclick="confirmReset()">Reset</button>
    </div>
  </div>
</div>

<div id="app"></div>

<div id="toast" class="toast"></div>

<script>
/* =========================================================
   ANNOTATION STUDIO
   ========================================================= */

const STORAGE_KEY = 'annotation-session-v1';

const state = {
  view: 'setup',
  promptsFile: null,
  promptsRows: [],
  promptsHeaders: [],
  promptCol: null,
  responseCol: null,
  instructionsCol: null,    // optional: column containing the chain of user instructions

  // ---- OraDraft docx-pairs mode (each case = 2 .docx: a draft + a prompts doc) ----
  draftFiles: [],           // [{ name, html, plainText, kind: 'draft'|'prompts'|'unknown', caseId, fileObj }]
  draftCases: [],           // [{ caseId, draftFileIndex, promptsFileIndex }] — paired by caseId
  draftInputMode: 'excel',  // 'excel' | 'docx-pairs' — set after upload
  taxonomyFile: null,
  taxonomyItems: [],        // flat list of all toggleable items across all sections
  taxonomyRawItems: [],     // full list before excluding caseIdField (single-sheet legacy)
  taxonomySectionMap: [],   // parallel array: section name for each item in taxonomyItems
  taxonomySectionNames: [], // ordered unique section names (= sheet names for multi-sheet)
  taxonomyCategories: [],   // parallel array: category tag for each item (OraDraft row 2)
  taxonomyCategoryDetails: {}, // { categoryName: descriptionString } — from "Category Details" sheet
  isMultiSheet: false,      // true when the taxonomy workbook had >1 sheet
  activeSectionTab: null,   // currently visible section in the annotator (null = all)
  activeCategoryFilter: null, // category to filter to (null = all)
  caseIdField: null,        // name of the case identifier (excluded from toggles)
  caseIdAutoDetected: false,
  taxonomyRawRows: [],      // single-sheet only: full sheet as array-of-arrays
  taxonomyHeaders: [],      // single-sheet only: column labels
  taxonomyColIdx: 0,        // single-sheet only: which column is selected
  taxonomySkipFirst: true,  // single-sheet only: skip header row
  conversations: [],
  annotations: {},  // { convIdx: { taxIdx: { value: 'yes'|'no'|null, note: '' } } }
  conversationNotes: {}, // { convIdx: 'overall note string' }
  instructionChains: {}, // { convIdx: [string, string, ...] } — manually editable
  currentIndex: 0,
  filter: 'all',    // 'all' | 'pending' | 'yes' | 'no'

  // ---- Docx mode (Structured Analysis: one case = N docx files) ----
  inputMode: 'excel',          // 'excel' | 'docx'
  caseName: null,              // extracted from common filename prefix
  sectionDocuments: {},        // { sectionName: { filename, html, originalHtml, warnings } }
  docxAssignments: {},         // { sectionName: filename } — manual mapping override
  pendingDocxFiles: [],        // raw file list before processing

  // ---- Editing & version history ----
  editingSection: null,        // section name currently being edited (null = view mode)
  sectionEdits: {},            // { sectionName: { currentHtml, history: [{ts, html, summary}] } }
  showHistory: false,          // panel visibility for the active section
  selectedHistoryTs: null,     // timestamp of the snapshot the user is previewing
  showInlineDiff: false,       // when true, overlay current view with delete/insert marks vs original
  snapshotDiffView: false,     // when previewing a snapshot, overlay it with diff marks vs original
};

let saveTimer = null;

/* ---------- Persistence ---------- */
async function saveSession(showIndicator = true) {
  if (showIndicator) setSaveIndicator('saving');
  try {
    const payload = {
      promptsHeaders: state.promptsHeaders,
      promptCol: state.promptCol,
      responseCol: state.responseCol,
      instructionsCol: state.instructionsCol,
      draftInputMode: state.draftInputMode,
      draftFiles: state.draftFiles,
      draftCases: state.draftCases,
      taxonomyItems: state.taxonomyItems,
      taxonomySectionMap: state.taxonomySectionMap,
      taxonomySectionNames: state.taxonomySectionNames,
      taxonomyCategories: state.taxonomyCategories,
      taxonomyCategoryDetails: state.taxonomyCategoryDetails,
      isMultiSheet: state.isMultiSheet,
      activeSectionTab: state.activeSectionTab,
      activeCategoryFilter: state.activeCategoryFilter,
      caseIdField: state.caseIdField,
      inputMode: state.inputMode,
      caseName: state.caseName,
      sectionDocuments: state.sectionDocuments,
      sectionEdits: state.sectionEdits,
      _draftEditsByConv: state._draftEditsByConv,
      _originalsByConv: state._originalsByConv,
      conversations: state.conversations,
      annotations: state.annotations,
      conversationNotes: state.conversationNotes,
      instructionChains: state.instructionChains,
      currentIndex: state.currentIndex,
      savedAt: new Date().toISOString(),
    };
    await window.storage.set(STORAGE_KEY, JSON.stringify(payload));
    if (showIndicator) setTimeout(() => setSaveIndicator('saved'), 400);
  } catch (e) {
    console.error('Save failed', e);
    if (showIndicator) setSaveIndicator('error');
  }
}

function scheduleSave() {
  setSaveIndicator('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveSession(true), 600);
}

async function loadSession() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (!r) return null;
    return JSON.parse(r.value);
  } catch (e) {
    return null;
  }
}

async function clearSession() {
  try { await window.storage.delete(STORAGE_KEY); } catch(e) {}
}

function setSaveIndicator(status) {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.className = 'save-indicator ' + (status === 'saving' ? 'saving' : '');
  el.querySelector('.label').textContent =
    status === 'saving' ? 'Saving…' :
    status === 'error' ? 'Save error' :
    'All changes saved';
}

/* ---------- Toast ---------- */
function toast(msg, ms = 2400) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

/* ---------- Render: Setup ---------- */
function renderSetup(existingSession) {
  document.getElementById('topbar').style.display = 'none';
  const root = document.getElementById('app');

  root.innerHTML = `
    <div class="setup-screen">
      <div class="setup-hero">
        <h1>OraDraft <em>Annotation</em></h1>
        <p>Drop in your conversations and taxonomy, then work through each prompt-response pair with a clear Yes/No call and a note for every category.</p>
      </div>

      ${existingSession ? `
        <div class="resume-banner">
          <div class="icon">↺</div>
          <div class="text">

/* ---------- File handling ---------- */
/**
 * Dispatcher for the drafts upload. Accepts:
 *  - one .xlsx/.csv file: Excel fallback path (one row per case)
 *  - many .docx files: pair them into cases by filename prefix, with one file
 *    per case treated as the draft and one as the prompts doc.
 */
async function handleConversationsFiles(event) {
  const files = Array.from(event.target.files || []);
  if (!files.length) return;
  const allExcel = files.every(f => /\.(xlsx|xls|csv)$/i.test(f.name));
  const allDocx  = files.every(f => /\.docx$/i.test(f.name));
  if (allExcel && files.length === 1) {
    state.draftInputMode = 'excel';
    // Clear any prior docx-pairs state
    state.draftFiles = [];
    state.draftCases = [];
    await handleExcelPromptsFile(files[0]);
  } else if (allDocx && files.length >= 1) {
    state.draftInputMode = 'docx-pairs';
    // Clear any prior Excel state
    state.promptsFile = null;
    state.promptsRows = [];
    state.promptsHeaders = [];
    state.promptCol = null;
    state.responseCol = null;
    state.instructionsCol = null;
    await handleDocxDraftFiles(files);
  } else {
    showSetupError('Please upload either one Excel/CSV file or a set of .docx files (two per case — a draft and a prompts doc).');
  }
}

/**
 * Convert each uploaded .docx to sanitized HTML + plain text via mammoth, then
 * classify each file as a 'draft' or 'prompts' doc by filename keyword, and
 * pair them up by filename prefix (the case ID). Files that can't be classified
 * keep kind='unknown' and the user fixes them in the pairing table.
 */
async function handleDocxDraftFiles(files) {
  if (!window.mammoth) {
    showSetupError('Document converter not loaded — please reload the page.');
    return;
  }
  state.draftFiles = [];
  try {
    for (const file of files) {
      const buf = await file.arrayBuffer();
      let html = '', plainText = '';
      try {
        const out = await mammoth.convertToHtml({ arrayBuffer: buf });
        html = out.value || '';
        if (typeof DOMPurify !== 'undefined') html = DOMPurify.sanitize(html);
        const plainOut = await mammoth.extractRawText({ arrayBuffer: buf });
        plainText = plainOut.value || htmlToPlainText(html);
      } catch (e) {
        html = `<p>(could not parse: ${escapeHtml(e.message || String(e))})</p>`;
      }
      const kind = classifyDocxFilename(file.name);
      const caseId = extractCaseIdFromFilename(file.name);
      state.draftFiles.push({ name: file.name, html, plainText, kind, caseId });
    }
    rebuildDraftCasePairs();
    renderSetup();
  } catch (e) {
    showSetupError('Could not read draft files: ' + e.message);
  }
}

/** Classify by filename keyword. Matches are loose — we look anywhere in the
 * base filename. The user can override per-file in the pairing UI. */
function classifyDocxFilename(name) {
  const stem = name.replace(/\.docx$/i, '').toLowerCase();
  // Prompts/instructions doc patterns
  if (/(prompts?|instructions?|chain|interactions?|user[\s_-]*input|user[\s_-]*request)/i.test(stem)) {
    return 'prompts';
  }
  // Draft doc patterns
  if (/(draft|output|response|answer|generated|result|final)/i.test(stem)) {
    return 'draft';
  }
  return 'unknown';
}

/** Extract a case identifier from a filename so we can group draft+prompts
 * doc pairs. We strip the kind-keyword and surrounding separators to get the
 * common prefix. E.g. "case-001-draft.docx" and "case-001-prompts.docx" both
 * produce "case-001". */
function extractCaseIdFromFilename(name) {
  let stem = name.replace(/\.docx$/i, '');
  // Remove kind keywords (and any adjacent separators) to leave just the prefix
  stem = stem.replace(/[\s_-]*(drafts?|outputs?|responses?|answers?|generated|results?|finals?|promptss?|prompts?|instructions?|chain|interactions?|user[\s_-]*input|user[\s_-]*request)[\s_-]*/gi, '');
  // Collapse whitespace and trailing separators
  stem = stem.replace(/[\s_-]+$/, '').replace(/^[\s_-]+/, '').trim();
  return stem || name.replace(/\.docx$/i, '');
}

/** Group files by caseId into pairs of (draft, prompts). Files keep their
 * positions in state.draftFiles; pairs reference them by index. */
function rebuildDraftCasePairs() {
  const byCase = new Map();   // caseId → { draftIdx, promptsIdx }
  state.draftFiles.forEach((f, i) => {
    const id = f.caseId || `case ${i + 1}`;
    if (!byCase.has(id)) byCase.set(id, { caseId: id, draftFileIndex: -1, promptsFileIndex: -1 });
    const entry = byCase.get(id);
    if (f.kind === 'draft' && entry.draftFileIndex === -1) entry.draftFileIndex = i;
    else if (f.kind === 'prompts' && entry.promptsFileIndex === -1) entry.promptsFileIndex = i;
    else if (entry.draftFileIndex === -1) entry.draftFileIndex = i;
    else if (entry.promptsFileIndex === -1) entry.promptsFileIndex = i;
  });
  state.draftCases = Array.from(byCase.values());
}

/** UI: a table showing each pair with manual overrides for kind + caseId. */

            const draft = pair.draftFileIndex >= 0 ? state.draftFiles[pair.draftFileIndex] : null;

              <div class="draft-pair-row ${incomplete ? 'incomplete' : ''}">
                <div class="draft-pair-case">

                      `).join('')}

function updateDraftPairCaseId(pairIdx, newId) {
  if (state.draftCases[pairIdx]) state.draftCases[pairIdx].caseId = newId.trim() || `case ${pairIdx + 1}`;
  // No re-render needed; this just updates the case identifier label.
  scheduleSave();
}

function reassignDraftFile(pairIdx, slot, fileIdxStr) {
  const fileIdx = parseInt(fileIdxStr);
  const pair = state.draftCases[pairIdx];
  if (!pair) return;
  if (slot === 'draft') pair.draftFileIndex = isNaN(fileIdx) ? -1 : fileIdx;
  if (slot === 'prompts') pair.promptsFileIndex = isNaN(fileIdx) ? -1 : fileIdx;
  renderSetup();
}

async function handleExcelPromptsFile(file) {
  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
    if (!rows.length) throw new Error('Sheet is empty');
    state.promptsFile = file.name;
    state.promptsRows = rows;
    state.promptsHeaders = Object.keys(rows[0]);
    state.promptCol = detectColumn(state.promptsHeaders,
      ['prompt','question','input','query','user','user_message','user message','initial prompt','initial request','user request']) || state.promptsHeaders[0];
    state.responseCol = detectColumn(state.promptsHeaders,
      ['draft','response','answer','output','reply','bot','assistant','bot_response','bot response','assistant_response','generated draft','final draft','document']) ||
      state.promptsHeaders[1] || state.promptsHeaders[0];
    state.instructionsCol = detectColumn(state.promptsHeaders,
      ['instructions','instruction chain','interactions','prompt chain','prompts','chain','history','conversation','dialog','dialogue','turns','turn history']) || null;
    renderSetup();
  } catch (e) {
    showSetupError('Could not read drafts file: ' + e.message);
  }
}

/**
 * Convert each uploaded .docx to sanitized HTML via mammoth, then auto-match
 * each file to a taxonomy section by keyword overlap in the filename. The user
 * can reassign manually via the dropdown next to each file in the setup card.
 */
async function handleDocxFiles(files) {
  try {
    if (!window.mammoth) throw new Error('Document converter not loaded — please reload the page.');
    const results = [];
    for (const file of files) {
      try {
        const buf = await file.arrayBuffer();
        const out = await mammoth.convertToHtml({ arrayBuffer: buf });
        let html = out.value || '';
        if (typeof DOMPurify !== 'undefined') html = DOMPurify.sanitize(html);
        results.push({
          filename: file.name,
          html,
          originalHtml: html,   // immutable baseline for diffing
          warnings: (out.messages || []).map(m => m.message || String(m)),
        });
      } catch (e) {
        results.push({ filename: file.name, html: '', originalHtml: '',
                       warnings: ['Could not parse: ' + (e.message || e)] });
      }
    }
    state.pendingDocxFiles = results;
    // Extract a common case-name prefix from the filenames
    state.caseName = extractCommonCaseName(results.map(r => r.filename));
    // Auto-map filenames → section names using keyword overlap
    autoAssignDocxToSections();
    renderSetup();
  } catch (e) {
    showSetupError('Could not read documents: ' + e.message);
  }
}

/** Strip the file extension and any leading underscores/dashes/spaces. */
function _normalizeForMatch(s) {
  return String(s || '')
    .replace(/\.docx$/i, '')
    .replace(/[_\-]+/g, ' ')
    .replace(/\s+/g, ' ')
    .toLowerCase()
    .trim();
}

/** Return the case name extracted from filenames. Tries (in order):
 *  1) Longest common prefix shared by all files
 *  2) Section-stripped: remove section-name keywords from each filename and
 *     take the longest remaining stem
 *  Returns null if neither produces something usable.
 */
function extractCommonCaseName(filenames) {
  if (!filenames.length) return null;
  const stripped = filenames.map(f => f.replace(/\.docx$/i, ''));

  // 1) Longest common prefix
  let prefix = stripped[0];
  for (const s of stripped.slice(1)) {
    let i = 0;
    while (i < prefix.length && i < s.length && prefix[i] === s[i]) i++;
    prefix = prefix.slice(0, i);
    if (!prefix) break;
  }
  const cleanPrefix = prefix.replace(/[_\-\s]+$/g, '').replace(/[_\-]+/g, ' ').trim();
  if (cleanPrefix.length >= 3) return cleanPrefix;

  // 2) Section-strip fallback. Remove known section keywords and see what's left.
  const sectionKeywords = [
    'factual', 'background', 'procedural', 'posture', 'liability',
    'settlement', 'damages', 'analysis', 'section', 'part',
  ];
  const stems = stripped.map(s => {
    let cleaned = s.toLowerCase();
    for (const kw of sectionKeywords) {
      cleaned = cleaned.replace(new RegExp(`[_\\-\\s]*${kw}[_\\-\\s]*`, 'gi'), ' ');
    }
    return cleaned.replace(/[_\-]+/g, ' ').replace(/\s+/g, ' ').trim();
  });
  // Pick the longest non-empty stem (likeliest to contain a case-name like "Smith v. Jones")
  const longestStem = stems.filter(s => s.length >= 3).sort((a, b) => b.length - a.length)[0];
  if (longestStem) {
    // Title-case it lightly: only capitalize first letter of each word
    return longestStem.replace(/\b\w/g, c => c.toUpperCase());
  }
  return null;
}

function setCaseName(value) {
  state.caseName = value || null;
  scheduleSave();
}

/** Decide which docx file belongs to which taxonomy section by keyword match. */
function autoAssignDocxToSections() {
  state.docxAssignments = {};
  state.sectionDocuments = {};
  const sections = state.taxonomySectionNames.length ? state.taxonomySectionNames : ['Document'];
  // Build a set of section keywords from each section name
  const sectionKeywords = sections.map(name => ({
    name,
    keywords: _normalizeForMatch(name).split(' ').filter(w => w.length >= 3),
  }));
  // For each file, score each section by keyword hits in the normalized filename
  const used = new Set();
  for (const file of state.pendingDocxFiles) {
    const norm = _normalizeForMatch(file.filename);
    let bestScore = 0, best = null;
    for (const sec of sectionKeywords) {
      if (used.has(sec.name)) continue;
      let score = 0;
      for (const kw of sec.keywords) if (norm.includes(kw)) score++;
      if (score > bestScore) { bestScore = score; best = sec.name; }
    }
    if (best) {
      used.add(best);
      state.docxAssignments[best] = file.filename;
      state.sectionDocuments[best] = file;
    }
  }
  // Any unmatched files: assign to the first unused section so they're not lost
  for (const file of state.pendingDocxFiles) {
    if (Object.values(state.docxAssignments).includes(file.filename)) continue;
    const next = sections.find(s => !used.has(s));
    if (next) {
      used.add(next);
      state.docxAssignments[next] = file.filename;
      state.sectionDocuments[next] = file;
    }
  }
}

/** User-driven reassignment via the dropdown. */
function reassignDocx(sectionName, filename) {
  if (!filename) {
    delete state.docxAssignments[sectionName];
    delete state.sectionDocuments[sectionName];
  } else {
    // Detach this filename from any other section
    for (const [otherSec, fname] of Object.entries(state.docxAssignments)) {
      if (fname === filename && otherSec !== sectionName) {
        delete state.docxAssignments[otherSec];
        delete state.sectionDocuments[otherSec];
      }
    }
    const file = state.pendingDocxFiles.find(f => f.filename === filename);
    if (file) {
      state.docxAssignments[sectionName] = filename;
      state.sectionDocuments[sectionName] = file;
    }
  }
  renderSetup();
}

/** Setup-card panel for docx mode: show each file with its detected section. */
function renderDocxMappingPanel() {
  if (!state.pendingDocxFiles.length) return '';
  const sections = state.taxonomySectionNames.length ? state.taxonomySectionNames : ['Document'];
  const allFiles = state.pendingDocxFiles.map(f => f.filename);
  const rows = sections.map(sec => {
    const assigned = state.docxAssignments[sec] || '';
    return `
      <div class="docx-row">
        <span class="docx-row-section">${escapeHtml(sec)}</span>
        <select class="docx-row-select" onchange="reassignDocx('${escapeAttr(sec)}', this.value)">
          <option value="">— not assigned —</option>
          ${allFiles.map(f => `<option value="${escapeAttr(f)}" ${f===assigned?'selected':''}>${escapeHtml(f)}</option>`).join('')}
        </select>
        ${assigned ? `<span class="docx-row-status ok">✓</span>` : `<span class="docx-row-status missing">missing</span>`}
      </div>
    `;
  }).join('');
  const unmatched = allFiles.filter(f => !Object.values(state.docxAssignments).includes(f));
  return `
    <div class="col-mapping" style="display:block;">
      <div class="tax-preview-label" style="margin-bottom:8px;">Document → Section mapping</div>
      <div class="docx-mapping">${rows}</div>
      ${unmatched.length ? `<div class="docx-warning">Not yet placed: ${unmatched.map(escapeHtml).join(', ')}</div>` : ''}
      <div style="margin-top:12px;">
        <label style="display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--ink-soft);">
          <span style="text-transform:uppercase; letter-spacing:0.06em; font-family:'JetBrains Mono', monospace; font-size:10px;">Case name</span>
          <input type="text" class="case-name-input" value="${escapeAttr(state.caseName || '')}"
            placeholder="e.g. Bigfoot v. OraClaim"
            oninput="setCaseName(this.value)" />
        </label>
      </div>
    </div>
  `;
}

async function handleTaxonomyFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    if (!wb.SheetNames.length) throw new Error('Workbook has no sheets');

    state.taxonomyFile = file.name;

    // ----- OraDraft pattern detection -----
    // OraDraft taxonomy uses two sheets: a "Taxonomy" sheet (items in row 1,
    // category tags in row 2) plus an optional "Category Details" sheet
    // describing each category. We detect this layout up front so it gets
    // its own parser regardless of sheet count.
    const isOraDraftLayout = detectOraDraftLayout(wb);

    if (isOraDraftLayout) {
      parseOraDraftTaxonomy(wb);
    } else if (wb.SheetNames.length > 1) {
      // ----- Multi-sheet (Structured Analysis pattern): each sheet = one section -----
      parseMultiSheetTaxonomy(wb);
    } else {
      // ----- Single-sheet: existing behavior (column picker etc.) -----
      parseSingleSheetTaxonomy(wb);
    }

    renderSetup();
  } catch (e) {
    showSetupError('Could not read taxonomy file: ' + e.message);
  }
}

/** OraDraft-style taxonomy: items horizontally in row 1, category tags in row 2.
 * Often paired with a "Category Details" sheet describing each tag. */
function detectOraDraftLayout(wb) {
  // Find the most plausible "items" sheet: one named "Taxonomy", or the first sheet
  const itemSheetName = wb.SheetNames.find(n => /taxonom/i.test(n)) || wb.SheetNames[0];
  const sheet = wb.Sheets[itemSheetName];
  if (!sheet) return false;
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', blankrows: false });
  if (rows.length < 2) return false;
  // Row 1 should have many text cells; row 2 should also have many text cells and
  // its first non-empty cell should be a category-header word ("Category", "Tag", etc.)
  const r1 = rows[0] || [];
  const r2 = rows[1] || [];
  const r1TextCount = r1.filter(c => String(c ?? '').trim() && isNaN(Number(c))).length;
  const r2TextCount = r2.filter(c => String(c ?? '').trim()).length;
  // Both rows need substantial content
  if (r1TextCount < 5 || r2TextCount < 5) return false;
  // Row 2 should have a "Category" or "Type" label as its first non-empty cell
  const r2First = r2.find(c => String(c ?? '').trim());
  if (!r2First) return false;
  return /^(category|tag|type|class)/i.test(String(r2First).trim());
}

function parseOraDraftTaxonomy(wb) {
  const itemSheetName = wb.SheetNames.find(n => /taxonom/i.test(n)) || wb.SheetNames[0];
  const sheet = wb.Sheets[itemSheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', blankrows: false });

  const r1 = rows[0] || [];
  const r2 = rows[1] || [];
  const items = [];
  const categories = [];

  // First column is typically "Case ID" (item) + "Category" (header in row 2) — skip it
  const identifierPattern = /^(case\s*[-_]?\s*(id|no|num(ber)?|#)|case|id|ref(erence)?|sequence|index|#|sr\.?\s*no\.?)$/i;
  let startCol = 0;
  if (r1.length && identifierPattern.test(String(r1[0] || '').trim())) {
    state.caseIdField = String(r1[0]).trim();
    state.caseIdAutoDetected = true;
    startCol = 1;
  } else {
    state.caseIdField = null;
  }

  for (let c = startCol; c < r1.length; c++) {
    const item = String(r1[c] ?? '').trim();
    if (!item) continue;
    items.push(item);
    categories.push(String(r2[c] ?? '').trim() || 'Uncategorized');
  }

  // Parse Category Details sheet if present
  const detailSheetName = wb.SheetNames.find(n => /categor.*detail|category.*description/i.test(n));
  const categoryDetails = {};
  if (detailSheetName) {
    const detailRows = XLSX.utils.sheet_to_json(wb.Sheets[detailSheetName], { header: 1, defval: '', blankrows: false });
    // Skip the header row; expect [Category, Description] columns
    for (let r = 1; r < detailRows.length; r++) {
      const cat = String(detailRows[r][0] ?? '').trim();
      const desc = String(detailRows[r][1] ?? '').trim();
      if (cat) categoryDetails[cat] = desc;
    }
  }

  state.isMultiSheet = false;
  state.taxonomySectionNames = [];
  state.taxonomySectionMap = [];
  state.activeSectionTab = null;
  state.activeCategoryFilter = null;
  state.taxonomyItems = items;
  state.taxonomyRawItems = items.slice();
  state.taxonomyCategories = categories;
  state.taxonomyCategoryDetails = categoryDetails;
  // Single-sheet UI state isn't used in OraDraft mode; clear for safety
  state.taxonomyRawRows = [];
  state.taxonomyHeaders = [];
  state.taxonomyColIdx = 0;
  state.taxonomySkipFirst = true;
}

/**
 * Parse a multi-sheet workbook. Each sheet becomes a section. For each sheet we
 * collect every non-empty cell value (which handles "NOTE" columns where extra
 * items live in rows 2/3). The first item per sheet, if it matches the case-id
 * pattern, becomes the global caseIdField (set once, from the first sheet).
 */
function parseMultiSheetTaxonomy(wb) {
  const identifierPattern = /^(case\s*[-_]?\s*(id|no|num(ber)?|#)|case|id|ref(erence)?|sequence|index|row\s*(no|num(ber)?|#)?|#|sr\.?\s*no\.?)$/i;
  // Words that are layout headers in multi-sheet workbooks, not real taxonomy items.
  // Match exact (case-insensitive) so we don't accidentally drop real items.
  const layoutHeaderWords = new Set([
    'category', 'categories', 'note', 'notes', 'header', 'heading', 'headings',
    'label', 'labels', 'type', 'types', 'class', 'classes', 'item', 'items',
    'name', 'names', 'description', 'descriptions', 'taxonomy', 'taxonomies',
  ]);
  const isLayoutHeader = (s) => layoutHeaderWords.has(s.toLowerCase().trim());

  const sectionNames = [];
  const items = [];
  const sectionMap = [];
  let caseIdField = null;

  for (const sheetName of wb.SheetNames) {
    const sheet = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', blankrows: false });
    if (!rows.length) continue;

    sectionNames.push(sheetName);

    const sheetItems = [];
    const seen = new Set();
    const maxCols = Math.max(...rows.map(r => r.length));
    for (let c = 0; c < maxCols; c++) {
      for (let r = 0; r < rows.length; r++) {
        const v = String(rows[r][c] ?? '').trim();
        if (!v || seen.has(v)) continue;
        // Skip layout-header artifacts like "Category" or "NOTE" that label
        // columns/rows rather than describe a taxonomy item.
        if (isLayoutHeader(v)) continue;
        seen.add(v);
        sheetItems.push(v);
      }
    }

    // First item that matches the case-id pattern becomes the global case-id field
    if (sheetItems.length && identifierPattern.test(sheetItems[0])) {
      if (caseIdField === null) caseIdField = sheetItems[0];
      sheetItems.shift();
    }

    sheetItems.forEach(it => {
      items.push(it);
      sectionMap.push(sheetName);
    });
  }

  state.isMultiSheet = true;
  state.taxonomySectionNames = sectionNames;
  state.taxonomyItems = items;
  state.taxonomyRawItems = items.slice();
  state.taxonomySectionMap = sectionMap;
  state.taxonomyCategories = [];
  state.taxonomyCategoryDetails = {};
  state.activeCategoryFilter = null;
  state.caseIdField = caseIdField;
  state.caseIdAutoDetected = !!caseIdField;
  state.activeSectionTab = sectionNames[0] || null;
  state.taxonomyRawRows = [];
  state.taxonomyHeaders = [];
  state.taxonomyColIdx = 0;
  state.taxonomySkipFirst = true;
}

/** Original single-sheet parser, factored out. */
function parseSingleSheetTaxonomy(wb) {
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', blankrows: false });
  if (!raw.length) throw new Error('Sheet is empty');

  const maxCols = Math.max(...raw.map(r => r.length));
  const rows = raw.map(r => {
    const out = new Array(maxCols).fill('');
    for (let i = 0; i < r.length; i++) out[i] = r[i] ?? '';
    return out;
  });

  const colLetter = (n) => {
    let s = ''; n += 1;
    while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); }
    return s;
  };
  const firstRow = rows[0] || [];
  const looksLikeHeader = firstRow.some(c => {
    const s = String(c ?? '').trim();
    return s && isNaN(Number(s));
  });
  const headers = [];
  for (let c = 0; c < maxCols; c++) {
    const v = String(firstRow[c] ?? '').trim();
    if (looksLikeHeader && v) headers.push(v);
    else headers.push('Column ' + colLetter(c));
  }

  const startRow = looksLikeHeader ? 1 : 0;
  const taxonomyHeaderHints = /^(taxonomy|categor|label|name|item|class|tag|topic|type|criterion|criteria|dimension|attribute|aspect|metric)/i;
  const scores = new Array(maxCols).fill(0);
  for (let c = 0; c < maxCols; c++) {
    let filled = 0, numeric = 0, textChars = 0, textCount = 0;
    for (let r = startRow; r < rows.length; r++) {
      const raw2 = rows[r][c];
      const s = String(raw2 ?? '').trim();
      if (!s) continue;
      filled++;
      if (!isNaN(Number(s)) && /^-?\d+(\.\d+)?$/.test(s)) numeric++;
      else { textCount++; textChars += s.length; }
    }
    if (filled === 0) { scores[c] = 0; continue; }
    const textRatio = textCount / filled;
    const avgLen = textCount ? textChars / textCount : 0;
    const lenBonus = (avgLen >= 3 && avgLen <= 60) ? 1 : 0.3;
    const headerBonus = taxonomyHeaderHints.test(headers[c]) ? 1.5 : 1.0;
    scores[c] = filled * textRatio * lenBonus * headerBonus;
  }
  let bestCol = 0;
  for (let c = 1; c < maxCols; c++) if (scores[c] > scores[bestCol]) bestCol = c;
  if (scores[bestCol] === 0) {
    const fallbackScores = new Array(maxCols).fill(0);
    for (let c = 0; c < maxCols; c++) {
      for (let r = startRow; r < rows.length; r++) {
        if (String(rows[r][c] ?? '').trim()) fallbackScores[c]++;
      }
    }
    bestCol = 0;
    for (let c = 1; c < maxCols; c++) if (fallbackScores[c] > fallbackScores[bestCol]) bestCol = c;
  }

  let useHorizontal = false;
  if (scores[bestCol] === 0) {
    const textCellsInFirstRow = firstRow.filter(c => String(c ?? '').trim()).length;
    if (textCellsInFirstRow >= 2) useHorizontal = true;
  }

  state.isMultiSheet = false;
  state.taxonomySectionNames = [];
  state.taxonomySectionMap = [];
  state.activeSectionTab = null;
  state.taxonomyCategories = [];
  state.taxonomyCategoryDetails = {};
  state.activeCategoryFilter = null;
  state.taxonomyRawRows = rows;
  state.taxonomyHeaders = headers;
  state.taxonomyColIdx = bestCol;
  state.taxonomySkipFirst = looksLikeHeader && !useHorizontal;
  state.caseIdField = null;
  state.caseIdAutoDetected = false;

  if (useHorizontal) {
    state.taxonomyRawItems = firstRow.map(c => String(c ?? '').trim()).filter(Boolean);
    state.taxonomyHeaders = ['(row 1 — horizontal layout)'];
    state.taxonomyColIdx = 0;
    state.taxonomyRawRows = [firstRow];
    state.taxonomySkipFirst = false;
    applyCaseIdField();
  } else {
    rebuildTaxonomyItems();
  }
}

function rebuildTaxonomyItems() {
  const start = state.taxonomySkipFirst ? 1 : 0;
  const col = state.taxonomyColIdx;
  state.taxonomyRawItems = state.taxonomyRawRows
    .slice(start)
    .map(r => String(r[col] ?? '').trim())
    .filter(Boolean);
  applyCaseIdField();
}

/**
 * If the first taxonomy item looks like a row identifier (Case ID, ID, Ref, etc.),
 * split it off so it's not rendered as a Yes/No toggle. The user can override this
 * via the checkbox in the upload card.
 */
function applyCaseIdField() {
  const identifierPattern = /^(case\s*[-_]?\s*(id|no|num(ber)?|#)|case|id|ref(erence)?|sequence|index|row\s*(no|num(ber)?|#)?|#|sr\.?\s*no\.?)$/i;
  if (state.taxonomyRawItems.length && identifierPattern.test(state.taxonomyRawItems[0])) {
    // Only auto-set if the user hasn't manually overridden
    if (state.caseIdAutoDetected || state.caseIdField === null) {
      state.caseIdField = state.taxonomyRawItems[0];
      state.caseIdAutoDetected = true;
    }
  } else {
    if (state.caseIdAutoDetected) {
      state.caseIdField = null;
      state.caseIdAutoDetected = false;
    }
  }
  if (state.caseIdField && state.taxonomyRawItems[0] === state.caseIdField) {
    state.taxonomyItems = state.taxonomyRawItems.slice(1);
  } else {
    state.taxonomyItems = state.taxonomyRawItems.slice();
  }
}

function toggleCaseIdField(useAsId) {
  if (useAsId) {
    if (state.taxonomyRawItems.length) state.caseIdField = state.taxonomyRawItems[0];
    state.caseIdAutoDetected = false;  // explicit user choice
  } else {
    state.caseIdField = null;
    state.caseIdAutoDetected = false;
  }
  if (state.caseIdField) {
    state.taxonomyItems = state.taxonomyRawItems.slice(1);
  } else {
    state.taxonomyItems = state.taxonomyRawItems.slice();
  }
  renderSetup();
}

function changeTaxonomyColumn(idx) {
  state.taxonomyColIdx = parseInt(idx, 10);
  rebuildTaxonomyItems();
  renderSetup();
}

function toggleTaxonomyHeader(skip) {
  state.taxonomySkipFirst = skip;
  rebuildTaxonomyItems();
  renderSetup();
}

function detectColumn(headers, candidates) {
  const lower = headers.map(h => h.toLowerCase().trim());
  for (const c of candidates) {
    const idx = lower.indexOf(c);
    if (idx >= 0) return headers[idx];
  }
  for (const c of candidates) {
    const idx = lower.findIndex(h => h.includes(c));
    if (idx >= 0) return headers[idx];
  }
  return null;
}

function showSetupError(msg) {
  const el = document.getElementById('setup-error');
  if (el) el.innerHTML = `<div class="error-banner">${escapeHtml(msg)}</div>`;
}

/* ---------- Start / resume ---------- */

/**
 * Some upstream pipelines store prompts as JSON-encoded strings and paste them
 * into Excel without decoding — so a cell that should read "## Heading\n\nBody"
 * arrives as the literal characters `## Heading\n\nBody` with backslash-n
 * sequences instead of real newlines. Markdown headings, lists, and code blocks
 * only render when the special marker is at the start of a real line, so we
 * normalize the common JSON escape sequences here. If the text was already
 * stored with real newlines, this is a no-op.
 */
function unescapeText(s) {
  if (!s || typeof s !== 'string') return s;
  // Only act if the text looks JSON-escaped (contains literal \n, \r, or \t).
  // This avoids touching content that already has real newlines.
  if (!/\\[nrt"\\]/.test(s)) return s;
  return s
    .replace(/\\r\\n/g, '\n')   // Windows-style first
    .replace(/\\n/g, '\n')
    .replace(/\\r/g, '\n')
    .replace(/\\t/g, '\t')
    .replace(/\\"/g, '"')
    .replace(/\\\\/g, '\\');
}

/**
 * Strip residual leading-whitespace padding from prompts that were originally
 * written as Python f-strings or docstrings. Those typically have a title at
 * column 0 and a body indented by 4 spaces — which markdown then treats as a
 * code block. We detect when the majority of non-empty lines share leading
 * whitespace and remove it. Real code blocks (fenced with ``` or natural list
 * indentation) are unaffected because they don't trigger the "majority indented"
 * pattern.
 */
function dedentForMarkdown(s) {
  if (!s || typeof s !== 'string') return s;
  const lines = s.split('\n');
  // Count non-empty lines and their leading-space widths
  let nonEmpty = 0;
  let minAllIndent = Infinity;
  const indentedWidths = [];
  for (const line of lines) {
    if (line.trim() === '') continue;
    nonEmpty++;
    const m = line.match(/^( +)/);
    const w = m ? m[1].length : 0;
    if (w < minAllIndent) minAllIndent = w;
    if (w > 0) indentedWidths.push(w);
  }
  if (nonEmpty === 0) return s;
  if (minAllIndent === Infinity) minAllIndent = 0;

  // Case A: every non-empty line is indented by the same minimum — standard dedent.
  if (minAllIndent > 0) {
    return lines.map(l => l.length >= minAllIndent ? l.slice(minAllIndent) : l).join('\n');
  }
  // Case B: some lines start at column 0 (often a title), but the majority of
  // non-empty lines are indented uniformly — strip the common indent off those.
  if (indentedWidths.length / nonEmpty >= 0.5) {
    const dedentBy = Math.min(...indentedWidths);
    if (dedentBy >= 2) {
      const prefix = ' '.repeat(dedentBy);
      return lines.map(l => l.startsWith(prefix) ? l.slice(dedentBy) : l).join('\n');
    }
  }
  return s;
}

/** Gating: are we ready to begin annotating? */
function canStartAnnotating() {
  if (!state.taxonomyItems.length) return false;
  if (state.draftInputMode === 'docx-pairs') {
    return state.draftCases.length > 0 && state.draftCases.some(p => p.draftFileIndex >= 0);
  }
  return state.promptsRows.length && state.promptCol && state.responseCol;
}

function startAnnotating() {
  if (state.draftInputMode === 'docx-pairs') {
    // Each case = 1 draft .docx + (optionally) 1 prompts .docx
    state.conversations = state.draftCases.map((pair, i) => {
      const draftFile = pair.draftFileIndex >= 0 ? state.draftFiles[pair.draftFileIndex] : null;
      const promptsFile = pair.promptsFileIndex >= 0 ? state.draftFiles[pair.promptsFileIndex] : null;
      const conv = {
        index: i,
        caseId: pair.caseId,
        prompt: '',     // Not used in docx-pairs (the prompts doc carries the chain)
        response: '',   // Replaced by draftHtml in synthetic doc population
        draftFilename: draftFile ? draftFile.name : '',
        draftHtml: draftFile ? draftFile.html : '<p>(no draft uploaded)</p>',
        promptsFilename: promptsFile ? promptsFile.name : '',
        promptsHtml: promptsFile ? promptsFile.html : '',
        promptsPlainText: promptsFile ? promptsFile.plainText : '',
      };
      // Seed instruction chain from prompts doc plain text on first load
      if (promptsFile && !state.instructionChains[i]) {
        state.instructionChains[i] = parseInstructionChain(promptsFile.plainText);
      }
      return conv;
    });
  } else {
    // Excel fallback: each row = a case
    state.conversations = state.promptsRows.map((row, i) => {
      const prompt = dedentForMarkdown(unescapeText((row[state.promptCol] ?? '').toString()));
      const response = dedentForMarkdown(unescapeText((row[state.responseCol] ?? '').toString()));
      const conv = { index: i, prompt, response, original: row };
      if (state.instructionsCol && !state.instructionChains[i]) {
        const raw = (row[state.instructionsCol] ?? '').toString();
        state.instructionChains[i] = parseInstructionChain(raw);
      }
      return conv;
    });
  }

  // Switch to "docx-style" mode so the editing UI activates. Each conversation
  // gets its own slot in sectionDocuments under a single "Draft" section.
  state.inputMode = 'docx';
  state.taxonomySectionNames = ['Draft'];
  state.activeSectionTab = 'Draft';
  state.sectionDocuments = {};
  state.sectionEdits = state.sectionEdits || {};

  // Build the synthetic doc for the first conversation; later goTo() refreshes it.
  populateSyntheticDocForConv(0);

  state.currentIndex = 0;
  state.view = 'annotate';
  state.conversations.forEach((c, i) => {
    if (!state.annotations[i]) state.annotations[i] = {};
  });
  saveSession(false);
  renderAnnotate();
}

/** Build an HTML "document" from the conversation's draft content so the editor
 * has something to render. For docx-pairs cases the draft is the mammoth-
 * converted HTML; for Excel cases it's the markdown-rendered response cell. */
function populateSyntheticDocForConv(convIdx) {
  const conv = state.conversations[convIdx];
  if (!conv) return;
  // NOTE: Caller is responsible for calling saveDraftEditStateForCurrent()
  // BEFORE invoking this, so we don't accidentally save to the wrong slot
  // after state.currentIndex has already changed.
  let html, filename;
  if (state.draftInputMode === 'docx-pairs') {
    html = conv.draftHtml || '<p>(no draft uploaded)</p>';
    filename = conv.draftFilename || `case-${convIdx + 1}-draft`;
  } else {
    html = conv.response.trim()
      ? renderMarkdown(conv.response)
      : '<p>(empty response)</p>';
    filename = `case-${convIdx + 1}-draft`;
  }
  state.sectionDocuments['Draft'] = {
    filename,
    html,
    originalHtml: getOriginalHtmlForConv(convIdx, html),
    warnings: [],
  };
  loadDraftEditStateForConv(convIdx);
}

/** Per-conversation edit buckets: state._draftEditsByConv[convIdx] holds the
 * sectionEdits['Draft'] value for that conversation. */
function saveDraftEditStateForCurrent() {
  if (typeof state._draftEditsByConv !== 'object' || state._draftEditsByConv === null) {
    state._draftEditsByConv = {};
  }
  if (state.sectionEdits && state.sectionEdits['Draft']) {
    state._draftEditsByConv[state.currentIndex] = state.sectionEdits['Draft'];
  }
}

function loadDraftEditStateForConv(convIdx) {
  if (typeof state._draftEditsByConv !== 'object' || state._draftEditsByConv === null) {
    state._draftEditsByConv = {};
  }
  if (state._draftEditsByConv[convIdx]) {
    state.sectionEdits = state.sectionEdits || {};
    state.sectionEdits['Draft'] = state._draftEditsByConv[convIdx];
  } else {
